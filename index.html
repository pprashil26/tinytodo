<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tiny Todo</title>

  <style>
    :root{
      --bg:#fff;
      --grid:#e8e8e8;
      --text:#111;
      --muted:#666;

      --row-h: 28px;     /* compact desktop row height */
      --font: 14px;
      --pad-x: 6px;

      --check-col: 34px;
      --indent-step: 18px;
      --max-indent: 6;   /* visual max (logic also clamps) */
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: var(--font);
    }

    header{
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg);
      border-bottom: 1px solid var(--grid);
      padding: 8px 10px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title{
      font-weight: 700;
      font-size: 14px;
      margin-right:auto;
    }
    .hint{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60vw;
    }

    .wrap{
      max-width: 920px;
      margin: 0 auto;
      padding: 8px 10px 22px;
    }

    /* Excel-like grid */
    .grid{
      border: 1px solid var(--grid);
      border-radius: 10px;
      overflow: hidden;
      background:#fff;
    }
    .row{
      display:grid;
      grid-template-columns: var(--check-col) 1fr;
      align-items:center;
      border-bottom: 1px solid var(--grid);
      min-height: var(--row-h);
    }
    .row:last-child{ border-bottom: none; }

    .cell{
      padding: 0 var(--pad-x);
      height: var(--row-h);
      display:flex;
      align-items:center;
    }
    .cell.check{
      justify-content:center;
      border-right: 1px solid var(--grid);
    }

    input[type="checkbox"]{
      width: 16px;
      height: 16px;
      margin:0;
      accent-color:#111;
    }

    /* Single-line text cell */
    .task{
      width:100%;
      height: calc(var(--row-h) - 2px);
      border:none;
      outline:none;
      font: inherit;
      padding: 0;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .done .task{
      text-decoration: line-through;
      color:#777;
    }

    /* Indent: multiple levels */
    .cell.text{
      padding-left: calc(var(--pad-x) + (var(--indent) * var(--indent-step)));
    }

    /* Footer buttons: minimal */
    .bar{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap: wrap;
      align-items:center;
    }
    button{
      border:1px solid var(--grid);
      background:#fff;
      padding:8px 10px;
      border-radius:10px;
      font: inherit;
      cursor:pointer;
    }
    button:active{ transform: translateY(1px); }

    .small{
      font-size:12px;
      color:var(--muted);
      margin-left:auto;
    }

    .file{ display:none; }

    /* Mobile touch friendliness (still compact) */
    @media (max-width: 520px){
      :root { --row-h: 32px; --font: 15px; }
      .hint{ display:none; }
      button{ padding:10px 12px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="title">Tiny Todo</div>
    <div class="hint">Enter=new row • Tab/Shift+Tab indent • Backspace empty=delete • Export/Import=sync</div>
  </header>

  <div class="wrap">
    <div class="grid" id="grid" aria-label="todo grid"></div>

    <div class="bar">
      <button id="add">+ Row</button>
      <button id="clearDone">Clear done</button>
      <button id="export">Export</button>
      <button id="import">Import</button>
      <input class="file" id="file" type="file" accept="application/json" />
      <div class="small" id="status"></div>
    </div>
  </div>

  <script>
    // -----------------------------
    // Model + Storage (offline tasks)
    // -----------------------------
    const KEY = "tiny_todo_v1";
    const MAX_INDENT = 6;

    // item: { id, text, done, indent }
    let items = load() || [
      { id: uid(), text: "Task", done: false, indent: 0 },
      { id: uid(), text: "Subtask (Tab to indent)", done: false, indent: 1 }
    ];

    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");

    function uid(){
      return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function load(){
      try{
        const raw = localStorage.getItem(KEY);
        return raw ? JSON.parse(raw) : null;
      }catch(e){ return null; }
    }

    function save(){
      localStorage.setItem(KEY, JSON.stringify(items));
      status("Saved");
    }

    let statusTimer;
    function status(msg){
      statusEl.textContent = msg;
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusEl.textContent = "", 900);
    }

    // -----------------------------
    // Render
    // -----------------------------
    function render(focusId){
      grid.innerHTML = "";

      items.forEach((it, idx) => {
        const row = document.createElement("div");
        row.className = "row" + (it.done ? " done" : "");
        row.dataset.id = it.id;
        row.dataset.index = idx;

        const cellCheck = document.createElement("div");
        cellCheck.className = "cell check";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!it.done;
        cb.addEventListener("change", () => {
          it.done = cb.checked;
          save();
          render(it.id);
        });
        cellCheck.appendChild(cb);

        const cellText = document.createElement("div");
        cellText.className = "cell text";
        cellText.style.setProperty("--indent", clamp(it.indent, 0, MAX_INDENT));

        const input = document.createElement("input");
        input.className = "task";
        input.value = it.text || "";
        input.placeholder = (idx === 0 && !it.text) ? "Type a task..." : "";
        input.spellcheck = false;
        input.autocomplete = "off";

        input.addEventListener("input", () => {
          it.text = input.value;
          save();
        });

        input.addEventListener("keydown", (e) => onKey(e, idx));

        cellText.appendChild(input);

        row.appendChild(cellCheck);
        row.appendChild(cellText);

        grid.appendChild(row);
      });

      // Restore focus
      if (focusId){
        const el = grid.querySelector(`.row[data-id="${focusId}"] .task`);
        if (el){
          el.focus();
          const v = el.value;
          el.setSelectionRange(v.length, v.length);
        }
      }
    }

    function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

    function focusIndex(i){
      const el = grid.querySelector(`.row[data-index="${i}"] .task`);
      if (el) el.focus();
    }

    // -----------------------------
    // Keyboard (Excel-like)
    // -----------------------------
    function onKey(e, idx){
      const it = items[idx];
      const input = e.target;

      // Enter: new row below (inherits indent)
      if (e.key === "Enter"){
        e.preventDefault();
        const newItem = { id: uid(), text: "", done: false, indent: it.indent };
        items.splice(idx + 1, 0, newItem);
        save();
        render(newItem.id);
        return;
      }

      // Tab: indent/outdent
      if (e.key === "Tab"){
        e.preventDefault();
        if (e.shiftKey){
          it.indent = clamp(it.indent - 1, 0, MAX_INDENT);
        } else {
          it.indent = clamp(it.indent + 1, 0, MAX_INDENT);
        }
        save();
        render(it.id);
        return;
      }

      // Backspace on empty: delete row (keep at least one)
      if (e.key === "Backspace"){
        if (input.value === "" && items.length > 1){
          e.preventDefault();
          const prev = Math.max(0, idx - 1);
          items.splice(idx, 1);
          save();
          render(items[prev].id);
          return;
        }
      }

      // Up/Down: move between rows when at boundaries
      if (e.key === "ArrowUp"){
        const atStart = input.selectionStart === 0 && input.selectionEnd === 0;
        if (atStart || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.max(0, idx - 1));
        }
      }

      if (e.key === "ArrowDown"){
        const atEnd = input.selectionStart === input.value.length && input.selectionEnd === input.value.length;
        if (atEnd || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.min(items.length - 1, idx + 1));
        }
      }

      // Optional ultra-minimal power shortcut (kept): Ctrl/Cmd+Enter toggles done
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        it.done = !it.done;
        save();
        render(it.id);
      }
    }

    // -----------------------------
    // Buttons
    // -----------------------------
    document.getElementById("add").addEventListener("click", () => {
      const newItem = { id: uid(), text: "", done: false, indent: 0 };
      items.push(newItem);
      save();
      render(newItem.id);
    });

    document.getElementById("clearDone").addEventListener("click", () => {
      const before = items.length;
      items = items.filter(x => !x.done);
      if (items.length === 0){
        items = [{ id: uid(), text: "", done: false, indent: 0 }];
      }
      save();
      render(items[0].id);
      status(`Removed ${before - items.length}`);
    });

    // Export/Import: simple cross-device sync
    document.getElementById("export").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `tiny-todo-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    const file = document.getElementById("file");
    document.getElementById("import").addEventListener("click", () => file.click());

    file.addEventListener("change", async () => {
      const f = file.files[0];
      if (!f) return;
      const text = await f.text();

      try{
        const data = JSON.parse(text);
        if (!Array.isArray(data)) throw new Error("Invalid file");

        items = data.map(x => ({
          id: x.id || uid(),
          text: String(x.text || ""),
          done: !!x.done,
          indent: clamp(Number(x.indent || 0), 0, MAX_INDENT)
        }));

        if (items.length === 0){
          items = [{ id: uid(), text: "", done: false, indent: 0 }];
        }

        save();
        render(items[0].id);
        status("Imported");
      }catch(e){
        alert("Import failed: " + e.message);
      }finally{
        file.value = "";
      }
    });

    // Initial render
    render(items[0]?.id);
  </script>
</body>
</html>
