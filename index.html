<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tiny Todo</title>

  <style>
    :root{
      --paper:#fcfbf7;
      --paper-edge:#efece3;
      --paper-line: rgba(40, 60, 90, 0.08);

      --text:#111;
      --muted: rgba(0,0,0,0.45);

      --row-h: 22px;
      --font: 13px;
      --pad-x: 4px;

      --check-col: 28px;
      --act-col: 66px; /* ⧉ ⎘ → */
      --indent-step: 16px;
      --max-indent: 6;

      /* A5 page width */
      --page-w: 148mm;

      --sidebar-w: 185px;
      --gap: 12px;

      /* Right rail */
      --rail-w: 170px;
      --rail-font: 12px;
      --rail-color: rgba(0,0,0,0.40);
      --rail-color-active: rgba(0,0,0,0.72);
      --rail-head-color: rgba(0,0,0,0.42);
      --rail-border: rgba(0,0,0,0.08);

      /* Header search */
      --search-w: 250px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    html{ -webkit-text-size-adjust: 100%; }

    body{
      margin:0;
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,0,0,0.05), transparent 55%),
        #f4f4f4;
    }

    button{
      font: inherit;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      color: var(--muted);
      cursor: pointer;
      line-height: 1.1;
    }
    button:hover{ color: rgba(0,0,0,0.85); }
    button:active{ transform: translateY(1px); }
    button:disabled{ opacity:.35; cursor: default; transform:none; }

    input[type="file"]{ display:none !important; }

    header{
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244,244,244,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header-inner{
      width: 100%;
      max-width: var(--page-w);
      margin: 0 auto;
      padding: 6px 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }
    .title{
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      color: rgba(0,0,0,0.65);
    }
    .page-search{
      width: var(--search-w);
      max-width: 60vw;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.85);
      font: inherit;
      color: rgba(0,0,0,0.75);
      outline: none;
      height: 26px;
    }
    .page-search::placeholder{ color: rgba(0,0,0,0.35); }

    .wrap{
      width:100%;
      max-width: calc(var(--page-w) + var(--sidebar-w) + var(--rail-w) + (var(--gap) * 2));
      margin: 0 auto;
      padding: 10px 8px 18px;
      display:flex;
      gap: var(--gap);
      align-items:flex-start;
      justify-content:center;
    }

    .sidebar{
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      position: sticky;
      top: 56px;
      align-self:flex-start;
    }

    .main{
      width:100%;
      max-width: var(--page-w);
    }

    .pages-rail{
      width: var(--rail-w);
      flex: 0 0 var(--rail-w);
      position: sticky;
      top: 56px;
      align-self:flex-start;
      font-size: var(--rail-font);
      color: var(--rail-color);
      user-select: none;
    }
    .pages-rail .rail-title{
      font-weight: 600;
      color: rgba(0,0,0,0.45);
      margin: 6px 0 8px;
      letter-spacing: 0.2px;
    }

    .rail-groups{
      max-height: calc(100vh - 110px);
      overflow: auto;
      padding-right: 4px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }
    .rail-groups::-webkit-scrollbar{ width: 6px; }
    .rail-groups::-webkit-scrollbar-thumb{
      background: rgba(0,0,0,0.10);
      border-radius: 999px;
    }

    details.rail-cat{
      border-top: 1px solid var(--rail-border);
      padding-top: 6px;
    }
    details.rail-cat:first-child{
      border-top:none;
      padding-top:0;
    }
    details.rail-cat > summary{
      list-style: none;
      cursor: pointer;
      user-select: none;
      display:flex;
      align-items:center;
      justify-content: space-between;
      color: var(--rail-head-color);
      font-weight: 600;
      gap: 8px;
    }
    details.rail-cat > summary::-webkit-details-marker{ display:none; }
    details.rail-cat > summary::after{
      content: "›";
      transform: rotate(90deg);
      opacity: .65;
      font-size: 14px;
      line-height: 1;
      flex: 0 0 auto;
    }
    details.rail-cat[open] > summary::after{
      transform: rotate(-90deg);
    }

    .rail-pages{
      margin-top: 6px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .page-row{
      display:flex;
      align-items:center;
      gap: 6px;
      min-width: 0;
    }

    .page-link{
      text-align:left;
      font-size: var(--rail-font);
      color: var(--rail-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 auto;
      min-width: 0;
    }
    .page-link.active{
      color: var(--rail-color-active);
      font-weight: 600;
    }

    .page-rename{
      flex: 0 0 auto;
      font-size: 12px;
      color: rgba(0,0,0,0.30);
      line-height: 1;
    }
    .page-rename:hover{ color: rgba(0,0,0,0.75); }

    .rail-empty{
      color: rgba(0,0,0,0.35);
      font-size: 11px;
      margin-top: 6px;
    }

    .results-cat{
      border-top: 1px solid var(--rail-border);
      padding-top: 6px;
    }
    .results-cat:first-child{ border-top:none; padding-top:0; }

    .results-cat-title{
      font-weight: 700;
      color: rgba(0,0,0,0.45);
      margin-bottom: 6px;
    }

    .results-page{
      margin: 6px 0 10px;
      padding-left: 2px;
    }
    .results-page-title{
      font-weight: 600;
      color: rgba(0,0,0,0.55);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
    }
    .results-page-title .name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      flex: 1 1 auto;
      min-width:0;
      text-align:left;
    }
    .results-page-title .jump{
      color: rgba(0,0,0,0.30);
      font-size: 11px;
      flex: 0 0 auto;
    }
    .results-page-title .jump:hover{ color: rgba(0,0,0,0.75); }

    .result-item{
      display:block;
      text-align:left;
      width:100%;
      color: rgba(0,0,0,0.45);
      font-size: 12px;
      line-height: 1.25;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      word-break: break-word;
      padding: 0;
      margin: 0 0 6px 0;
    }
    .result-item:hover{ color: rgba(0,0,0,0.85); }
    .result-meta{
      color: rgba(0,0,0,0.25);
      font-size: 10px;
      margin-right: 6px;
    }

    .paper{
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 14px;
      overflow: hidden;
      background: var(--paper);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.08),
        0 2px 6px rgba(0,0,0,0.06);
    }

    .grid{
      position: relative;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0.0) 24px),
        linear-gradient(to right,
          transparent 0,
          transparent calc(var(--check-col) - 1px),
          rgba(40,60,90,0.10) calc(var(--check-col) - 1px),
          transparent var(--check-col)
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--paper-line) calc(var(--row-h) - 1px),
          var(--paper-line) var(--row-h)
        );
    }

    .row{
      display:grid;
      grid-template-columns: var(--check-col) 1fr var(--act-col);
      align-items:center;
      min-height: var(--row-h);
    }

    .cell{
      padding: 0 var(--pad-x);
      height: var(--row-h);
      display:flex;
      align-items:center;
      min-width:0;
    }
    .cell.check{
      justify-content:center;
      border-right: 1px solid rgba(40,60,90,0.08);
    }
    .cell.text{
      padding-left: calc(var(--pad-x) + (var(--indentLevel) * var(--indent-step)));
    }
    .cell.act{
      justify-content:flex-end;
      gap: 4px;
      border-left: 1px solid rgba(40,60,90,0.06);
      padding-right: 6px;
    }

    input[type="checkbox"]{
      width: 14px;
      height: 14px;
      margin:0;
      accent-color:#222;
    }

    .task{
      width:100%;
      height: calc(var(--row-h) - 2px);
      border:none;
      outline:none;
      background: transparent;
      font: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .done .task{ text-decoration: line-through; color:#777; }
    .archivedRow .task{ color:#666; }

    .mini-act{
      font-size: 12px;
      color: rgba(0,0,0,0.42);
      line-height: 1;
      padding: 0 1px;
    }
    .mini-act:hover{ color: rgba(0,0,0,0.85); }
    .mini-act:disabled{ opacity: .25; }

    .side-block{
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      padding: 8px;
    }

    details.group{
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 8px;
      margin-top: 8px;
    }
    details.group:first-child{
      border-top:none;
      padding-top:0;
      margin-top:0;
    }

    summary.group-sum{
      list-style:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content: space-between;
      user-select:none;
      color:#555;
      font-weight:600;
    }
    summary.group-sum::-webkit-details-marker{ display:none; }
    summary.group-sum::after{
      content:"›";
      transform: rotate(90deg);
      opacity:.65;
    }
    details[open] summary.group-sum::after{ transform: rotate(-90deg); }

    .group-body{
      margin-top: 8px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }

    .bottom-actions{
      display:flex;
      justify-content:center;
      gap: 14px;
      align-items:center;
      margin-top: 10px;
      padding: 0 2px;
      font-size: 12px;
    }

    #toast{
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #222;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      display: none;
      z-index: 30;
      max-width: 90vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.compact .sidebar{ display:none; }
    body.compact .wrap{
      display:flex;
      max-width: calc(var(--page-w) + var(--rail-w) + var(--gap));
    }
    body.compact .main{ margin: 0; max-width: var(--page-w); }
    body.compact .pages-rail{
      position: fixed;
      right: 10px;
      top: 62px;
      width: var(--rail-w);
      max-height: calc(100vh - 80px);
      background: transparent;
      padding: 0;
      z-index: 15;
    }
    body.compact .wrap{
      justify-content: center;
      padding-right: calc(var(--rail-w) + 14px);
    }

    @media (max-width: 520px){
      :root{
        --row-h: 28px;
        --font: 15px;
        --pad-x: 6px;
        --check-col: 34px;
        --act-col: 72px;
        --indent-step: 18px;
        --sidebar-w: 180px;
        --rail-w: 145px;
        --rail-font: 11px;
        --search-w: 190px;
      }
      .task{ font-size:16px; }
      .header-inner{ gap: 8px; }
    }
  </style>
</head>

<body>
<header>
  <div class="header-inner">
    <span class="title" id="toggleUi" title="Tap to hide/show sidebar">Tiny Todo</span>
    <input id="pageSearch" class="page-search" type="text" placeholder="Search pages…" autocomplete="off" />
    <button type="button" id="newPage">+ Page</button>
    <button type="button" id="todayBtn" title="Go to Today">Today</button>
  </div>
</header>

<div id="toast"></div>

<div class="wrap">
  <aside class="sidebar">
    <div class="side-block">
      <details class="group">
        <summary class="group-sum">Backup</summary>
        <div class="group-body">
          <button type="button" id="exportJsonBtn">Export JSON</button>
          <button type="button" id="importJsonBtn">Import JSON</button>
          <button type="button" id="exportTxtBtn">Export TXT</button>
          <button type="button" id="importTxtBtn">Import TXT</button>
          <button type="button" id="backupAllBtn">Backup ALL</button>
          <button type="button" id="restoreAllBtn">Restore ALL</button>
        </div>
      </details>

      <details class="group">
        <summary class="group-sum">Archive</summary>
        <div class="group-body">
          <button type="button" id="archiveDoneBtn">Archive done</button>
          <button type="button" id="restoreFocusedBtn">Restore focused</button>
          <button type="button" id="deleteFocusedBtn">Delete focused</button>
          <button type="button" id="emptyArchiveBtn">Empty archive</button>
        </div>
      </details>

      <details class="group">
        <summary class="group-sum">Page / View</summary>
        <div class="group-body">
          <button type="button" id="viewActiveBtn">Active</button>
          <button type="button" id="viewArchiveBtn">Archive</button>
          <button type="button" id="deletePageBtn">Delete Page</button>
        </div>
      </details>

      <div style="margin-top:10px;color:var(--muted);font-size:12px" id="status"></div>
    </div>
  </aside>

  <main class="main">
    <div class="paper">
      <div class="grid" id="grid" aria-label="todo grid"></div>
    </div>

    <div class="bottom-actions">
      <button type="button" id="addRowBtn">+ Row</button>
      <button type="button" id="sortBtn">Sort A→Z</button>
    </div>

    <input id="fileJson" type="file" accept="application/json">
    <input id="fileTxt" type="file" accept="text/plain,.txt">
    <input id="fileAll" type="file" accept="application/json">
    <textarea id="clipFallback" aria-hidden="true"
      style="position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none"></textarea>
  </main>

  <aside class="pages-rail" aria-label="Pages rail">
    <div class="rail-title" id="railTitle">Pages</div>
    <div class="rail-groups" id="pagesRail"></div>
  </aside>
</div>

<script>
(() => {
  const KEY_V3 = "tiny_todo_v3_pages";
  const KEY_V2 = "tiny_todo_v2";
  const KEY_V1 = "tiny_todo_v1";
  const UI_KEY = "tiny_todo_ui_compact";

  const RAIL_KEY_PREFIX = "tiny_todo_rail_closed::";
  const UNCATEGORIZED = "Uncategorized";

  const MAX_INDENT = Number(getComputedStyle(document.documentElement).getPropertyValue("--max-indent")) || 6;

  const body = document.body;
  const toggleUi = document.getElementById("toggleUi");
  const toastEl = document.getElementById("toast");
  const statusEl = document.getElementById("status");

  const pageSearch = document.getElementById("pageSearch");
  const railTitle = document.getElementById("railTitle");
  const pagesRail = document.getElementById("pagesRail");

  const newPageBtn = document.getElementById("newPage");
  const todayBtn = document.getElementById("todayBtn");

  const grid = document.getElementById("grid");
  const addRowBtn = document.getElementById("addRowBtn");
  const sortBtn = document.getElementById("sortBtn");

  const exportJsonBtn = document.getElementById("exportJsonBtn");
  const importJsonBtn = document.getElementById("importJsonBtn");
  const exportTxtBtn  = document.getElementById("exportTxtBtn");
  const importTxtBtn  = document.getElementById("importTxtBtn");
  const backupAllBtn  = document.getElementById("backupAllBtn");
  const restoreAllBtn = document.getElementById("restoreAllBtn");

  const archiveDoneBtn = document.getElementById("archiveDoneBtn");
  const restoreFocusedBtn = document.getElementById("restoreFocusedBtn");
  const deleteFocusedBtn = document.getElementById("deleteFocusedBtn");
  const emptyArchiveBtn = document.getElementById("emptyArchiveBtn");

  const viewActiveBtn = document.getElementById("viewActiveBtn");
  const viewArchiveBtn = document.getElementById("viewArchiveBtn");
  const deletePageBtn = document.getElementById("deletePageBtn");

  const fileJson = document.getElementById("fileJson");
  const fileTxt = document.getElementById("fileTxt");
  const fileAll = document.getElementById("fileAll");
  const clipFallback = document.getElementById("clipFallback");

  let uiCompact = (localStorage.getItem(UI_KEY) === "1");
  function applyUiMode(){ body.classList.toggle("compact", uiCompact); }
  function toggleUiMode(){
    uiCompact = !uiCompact;
    localStorage.setItem(UI_KEY, uiCompact ? "1" : "0");
    applyUiMode();
  }
  applyUiMode();

  let railQuery = "";
  let notebook = loadNotebook() || seedNotebook();
  let view = "active";
  let focusedId = null;

  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

  let toastTimer;
  function toast(msg){
    statusEl.textContent = msg || "";
    if (!msg){
      toastEl.style.display = "none";
      toastEl.textContent = "";
      return;
    }
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.style.display = "none";
      toastEl.textContent = "";
      statusEl.textContent = "";
    }, 900);
  }

  function normalizeCategory(cat){
    const c = String(cat || "").trim();
    return c ? c : UNCATEGORIZED;
  }

  function norm(s){ return String(s || "").toLowerCase(); }
  function tokenize(q){
    const s = norm(q).trim();
    if (!s) return [];
    return s.split(/\s+/).filter(Boolean);
  }
  function pageHaystack(p){
    let h = (p.category || "") + " " + (p.name || "");
    if (Array.isArray(p.items)){
      for (const it of p.items){
        if (it && it.text) h += " " + it.text;
      }
    }
    return norm(h);
  }
  function pageMatchesTokens(p, tokens){
    if (!tokens || tokens.length === 0) return true;
    const hay = pageHaystack(p);
    for (const t of tokens){
      if (!hay.includes(t)) return false;
    }
    return true;
  }
  function itemMatchesTokens(itemText, tokens){
    if (!tokens || tokens.length === 0) return true;
    const hay = norm(itemText || "");
    for (const t of tokens){
      if (!hay.includes(t)) return false;
    }
    return true;
  }

  /* -------------------------
     ✅ FIX: pages are keyed by pageId (computed property)
     ------------------------- */
  function seedItems(){
    return [
      { id: uid(), text: "Task", done:false, indent:0, archived:false, archivedAt:null },
      { id: uid(), text: "Subtask (Tab to indent)", done:false, indent:1, archived:false, archivedAt:null }
    ];
  }

  function seedNotebook(){
    const pid = uid();
    return {
      version: 1,
      activePageId: pid,
      pages: {
        [pid]: { id: pid, name: "Personal", category: UNCATEGORIZED, items: seedItems(), sortUndo: null }
      }
    };
  }

  function normalizeItems(raw){
    if (!Array.isArray(raw)) return [];
    return raw.map(x => ({
      id: x.id || uid(),
      text: String(x.text || ""),
      done: !!x.done,
      indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
      archived: !!x.archived,
      archivedAt: x.archivedAt || (x.archived ? Date.now() : null)
    }));
  }

  function ensureNotebookShape(nb){
    if (!nb || typeof nb !== "object") return null;
    if (!nb.pages || typeof nb.pages !== "object") return null;

    const ids = Object.keys(nb.pages);
    if (!ids.length) return null;

    for (const pid of ids){
      const p = nb.pages[pid];
      if (!p || typeof p !== "object") return null;

      p.id = pid;
      p.name = String(p.name || "Untitled");
      p.category = normalizeCategory(p.category);

      p.items = normalizeItems(p.items);
      if (!("sortUndo" in p)) p.sortUndo = null;

      if (p.items.filter(x => !x.archived).length === 0){
        p.items.unshift({ id: uid(), text:"", done:false, indent:0, archived:false, archivedAt:null });
      }
    }

    if (!nb.activePageId || !nb.pages[nb.activePageId]){
      nb.activePageId = ids[0];
    }
    nb.version = 1;
    return nb;
  }

  function loadNotebook(){
    try{
      const raw3 = localStorage.getItem(KEY_V3);
      if (raw3) return ensureNotebookShape(JSON.parse(raw3));

      // ✅ FIX migration v2 -> v3
      const raw2 = localStorage.getItem(KEY_V2);
      if (raw2){
        const items = normalizeItems(JSON.parse(raw2));
        const pid = uid();
        const nb = ensureNotebookShape({
          version: 1,
          activePageId: pid,
          pages: {
            [pid]: { id: pid, name: "Personal", category: UNCATEGORIZED, items: items.length ? items : seedItems(), sortUndo: null }
          }
        });
        localStorage.setItem(KEY_V3, JSON.stringify(nb));
        return nb;
      }

      // ✅ FIX migration v1 -> v3
      const raw1 = localStorage.getItem(KEY_V1);
      if (raw1){
        const parsed1 = JSON.parse(raw1);
        if (Array.isArray(parsed1)){
          const migrated = parsed1.map(x => ({
            id: x.id || uid(),
            text: String(x.text || ""),
            done: !!x.done,
            indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
            archived:false,
            archivedAt:null
          }));
          const pid = uid();
          const nb = ensureNotebookShape({
            version: 1,
            activePageId: pid,
            pages: {
              [pid]: { id: pid, name: "Personal", category: UNCATEGORIZED, items: migrated.length ? migrated : seedItems(), sortUndo: null }
            }
          });
          localStorage.setItem(KEY_V3, JSON.stringify(nb));
          return nb;
        }
      }
      return null;
    }catch(e){
      return null;
    }
  }

  function saveNotebook(){
    localStorage.setItem(KEY_V3, JSON.stringify(notebook));
    rebuildRail();
    updateSortLabel();
  }

  function currentPage(){ return notebook.pages[notebook.activePageId]; }

  function catStorageKey(cat){ return RAIL_KEY_PREFIX + encodeURIComponent(cat); }
  function isCatClosed(cat){ return localStorage.getItem(catStorageKey(cat)) === "1"; }
  function setCatClosed(cat, closed){
    const k = catStorageKey(cat);
    if (closed) localStorage.setItem(k, "1");
    else localStorage.removeItem(k);
  }

  function getSortedPages(){
    return Object.values(notebook.pages).slice().sort((a,b) => a.name.localeCompare(b.name));
  }

  function parseRenameInput(raw, currentCategory){
    const s = String(raw || "").trim();
    if (!s) return null;
    const idx = s.indexOf("::");
    if (idx >= 0){
      const catPart = s.slice(0, idx).trim();
      const namePart = s.slice(idx + 2).trim();
      if (!namePart) return null;
      return { category: normalizeCategory(catPart), name: namePart };
    }
    return { category: normalizeCategory(currentCategory), name: s };
  }

  function rebuildRail(){
    const tokens = tokenize(railQuery);
    const searching = tokens.length > 0;
    railTitle.textContent = searching ? "Results" : "Pages";
    pagesRail.innerHTML = "";

    const pagesAll = getSortedPages();
    const matchedPages = pagesAll.filter(p => pageMatchesTokens(p, tokens));

    if (searching){
      const catMap = new Map();
      for (const p of matchedPages){
        const hits = [];
        for (const it of (p.items || [])){
          const txt = (it && it.text) ? String(it.text) : "";
          if (!txt.trim()) continue;
          if (itemMatchesTokens(txt, tokens)){
            hits.push({ itemId: it.id, text: txt, archived: !!it.archived, done: !!it.done, indent: Number(it.indent || 0) });
          }
        }
        if (hits.length === 0) continue;
        const cat = normalizeCategory(p.category);
        if (!catMap.has(cat)) catMap.set(cat, []);
        catMap.get(cat).push({ page: p, hits });
      }

      if (catMap.size === 0){
        const div = document.createElement("div");
        div.className = "rail-empty";
        div.textContent = "No task matches";
        pagesRail.appendChild(div);
        return;
      }

      const cats = Array.from(catMap.keys()).sort((a,b) => {
        if (a === UNCATEGORIZED && b !== UNCATEGORIZED) return 1;
        if (b === UNCATEGORIZED && a !== UNCATEGORIZED) return -1;
        return a.localeCompare(b);
      });

      for (const cat of cats){
        const wrap = document.createElement("div");
        wrap.className = "results-cat";

        const h = document.createElement("div");
        h.className = "results-cat-title";
        h.textContent = cat;
        wrap.appendChild(h);

        const pageEntries = catMap.get(cat).slice().sort((a,b)=>a.page.name.localeCompare(b.page.name));
        for (const entry of pageEntries){
          const sec = document.createElement("div");
          sec.className = "results-page";

          const titleRow = document.createElement("div");
          titleRow.className = "results-page-title";

          const nameBtn = document.createElement("button");
          nameBtn.type = "button";
          nameBtn.className = "name";
          nameBtn.textContent = entry.page.name;
          nameBtn.addEventListener("click", () => switchPage(entry.page.id));

          const jump = document.createElement("button");
          jump.type = "button";
          jump.className = "jump";
          jump.textContent = "→";
          jump.addEventListener("click", () => switchPage(entry.page.id));

          titleRow.appendChild(nameBtn);
          titleRow.appendChild(jump);
          sec.appendChild(titleRow);

          for (const hit of entry.hits){
            const b = document.createElement("button");
            b.type = "button";
            b.className = "result-item";

            const meta = document.createElement("span");
            meta.className = "result-meta";
            const ind = Math.max(0, Math.min(9, hit.indent|0));
            const arch = hit.archived ? "A" : "•";
            meta.textContent = `${arch}${ind>0 ? ("·" + ind) : ""}`;
            b.appendChild(meta);

            const txt = document.createElement("span");
            txt.textContent = hit.text;
            b.appendChild(txt);

            b.addEventListener("click", () => goToItem(entry.page.id, hit.itemId, hit.archived));
            sec.appendChild(b);
          }
          wrap.appendChild(sec);
        }
        pagesRail.appendChild(wrap);
      }
      return;
    }

    // Normal pages rail
    const groups = new Map();
    for (const p of pagesAll){
      const cat = normalizeCategory(p.category);
      if (!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(p);
    }

    const cats = Array.from(groups.keys()).sort((a,b) => {
      if (a === UNCATEGORIZED && b !== UNCATEGORIZED) return 1;
      if (b === UNCATEGORIZED && a !== UNCATEGORIZED) return -1;
      return a.localeCompare(b);
    });

    for (const cat of cats){
      const details = document.createElement("details");
      details.className = "rail-cat";
      if (!isCatClosed(cat)) details.open = true;

      const summary = document.createElement("summary");
      summary.textContent = cat;

      const list = document.createElement("div");
      list.className = "rail-pages";

      const pages = groups.get(cat).slice().sort((a,b)=>a.name.localeCompare(b.name));
      for (const p of pages){
        const row = document.createElement("div");
        row.className = "page-row";

        const link = document.createElement("button");
        link.type = "button";
        link.className = "page-link" + (p.id === notebook.activePageId ? " active" : "");
        link.textContent = p.name;
        link.addEventListener("click", () => switchPage(p.id));

        const ren = document.createElement("button");
        ren.type = "button";
        ren.className = "page-rename";
        ren.textContent = "✎";
        ren.addEventListener("click", (ev) => {
          ev.preventDefault(); ev.stopPropagation();
          renamePageById(p.id);
        });

        row.appendChild(link);
        row.appendChild(ren);
        list.appendChild(row);
      }

      details.appendChild(summary);
      details.appendChild(list);
      details.addEventListener("toggle", () => setCatClosed(cat, !details.open));
      pagesRail.appendChild(details);
    }
  }

  function switchPage(pageId){
    if (!notebook.pages[pageId]) return;
    notebook.activePageId = pageId;
    focusedId = null;
    saveNotebook();
    render(null);
  }

  function newPage(){
    const name = prompt("Page name:", "New Page");
    if (!name) return;
    const id = uid();
    notebook.pages[id] = {
      id,
      name: String(name).trim(),
      category: UNCATEGORIZED,
      items: [{ id: uid(), text:"", done:false, indent:0, archived:false, archivedAt:null }],
      sortUndo: null
    };
    notebook.activePageId = id;
    focusedId = notebook.pages[id].items[0].id;
    saveNotebook();
    setView("active");
    render(focusedId);
    toast("Page created");
  }

  function renamePageById(pageId){
    const p = notebook.pages[pageId];
    if (!p) return;
    const prefill = `${normalizeCategory(p.category)}::${p.name}`;
    const raw = prompt("Rename (Category::Name or Name):", prefill);
    if (raw == null) return;
    const parsed = parseRenameInput(raw, p.category);
    if (!parsed) return;
    p.name = parsed.name;
    p.category = parsed.category;
    saveNotebook();
    toast("Renamed");
  }

  function goToItem(pageId, itemId, archived){
    if (!notebook.pages[pageId]) return;
    notebook.activePageId = pageId;
    focusedId = itemId;
    view = archived ? "archive" : "active";
    saveNotebook();
    render(itemId);
  }

  function setView(v){
    view = v;
    render(focusedId);
  }

  function visibleItems(){
    const items = currentPage().items;
    return items.filter(it => view === "active" ? !it.archived : it.archived);
  }

  function getItemById(id){
    return currentPage().items.find(x => x.id === id) || null;
  }

  function render(tryFocusId){
    const p = currentPage();
    const list = visibleItems();
    grid.innerHTML = "";

    const isTodayPage = (p.name || "").trim().toLowerCase() === "today";

    list.forEach((it, idx) => {
      const row = document.createElement("div");
      row.className = "row" + (it.done ? " done" : "") + (it.archived ? " archivedRow" : "");
      row.dataset.id = it.id;
      row.dataset.index = String(idx);

      const cellCheck = document.createElement("div");
      cellCheck.className = "cell check";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!it.done;
      cb.addEventListener("change", () => { it.done = cb.checked; saveNotebook(); render(it.id); });
      cellCheck.appendChild(cb);

      const cellText = document.createElement("div");
      cellText.className = "cell text";
      cellText.style.setProperty("--indentLevel", clamp(it.indent, 0, MAX_INDENT));

      const input = document.createElement("input");
      input.className = "task";
      input.value = it.text || "";
      input.spellcheck = false;
      input.autocomplete = "off";
      input.addEventListener("focus", () => focusedId = it.id);
      input.addEventListener("input", () => { it.text = input.value; saveNotebook(); });
      input.addEventListener("keydown", (e) => onKey(e, it.id));
      cellText.appendChild(input);

      const cellAct = document.createElement("div");
      cellAct.className = "cell act";

      const copyMini = document.createElement("button");
      copyMini.className = "mini-act";
      copyMini.textContent = "⧉";
      copyMini.disabled = (view !== "active");
      copyMini.addEventListener("click", () => doCopyById(it.id));

      const pasteMini = document.createElement("button");
      pasteMini.className = "mini-act";
      pasteMini.textContent = "⎘";
      pasteMini.disabled = (view !== "active");
      pasteMini.addEventListener("click", () => doPasteBelowId(it.id));

      const moveMini = document.createElement("button");
      moveMini.className = "mini-act";
      moveMini.textContent = "→";
      moveMini.disabled = !(view === "active" && !isTodayPage);
      moveMini.addEventListener("click", () => { if (!moveMini.disabled) moveBlockToToday(it.id); });

      cellAct.appendChild(copyMini);
      cellAct.appendChild(pasteMini);
      cellAct.appendChild(moveMini);

      row.appendChild(cellCheck);
      row.appendChild(cellText);
      row.appendChild(cellAct);
      grid.appendChild(row);
    });

    updateSortLabel();

    if (tryFocusId){
      const el = grid.querySelector(`.row[data-id="${tryFocusId}"] .task`);
      if (el){
        el.scrollIntoView({ block: "center", behavior: "auto" });
        el.focus();
        const v = el.value;
        el.setSelectionRange(v.length, v.length);
      }
    }
  }

  function onKey(e, id){
    const p = currentPage();
    const it = getItemById(id);
    if (!it) return;

    const list = visibleItems();
    const idx = list.findIndex(x => x.id === id);
    const input = e.target;

    if (e.key === "Enter"){
      if (view !== "active") return;
      e.preventDefault();
      const newItem = { id: uid(), text:"", done:false, indent: it.indent, archived:false, archivedAt:null };
      const gi = p.items.findIndex(x => x.id === it.id);
      p.items.splice(gi + 1, 0, newItem);
      p.sortUndo = null;
      saveNotebook();
      render(newItem.id);
      return;
    }

    if (e.key === "Tab"){
      e.preventDefault();
      it.indent = e.shiftKey ? clamp(it.indent - 1, 0, MAX_INDENT) : clamp(it.indent + 1, 0, MAX_INDENT);
      p.sortUndo = null;
      saveNotebook();
      render(it.id);
      return;
    }

    if (e.key === "Backspace"){
      if (input.value === "" && list.length > 1){
        e.preventDefault();
        const gi = p.items.findIndex(x => x.id === it.id);
        p.items.splice(gi, 1);
        p.sortUndo = null;
        saveNotebook();
        const prevIdx = Math.max(0, idx - 1);
        const after = visibleItems()[prevIdx];
        render(after ? after.id : null);
        return;
      }
    }
  }

  function addRow(){
    if (view !== "active") setView("active");
    const p = currentPage();
    const newItem = { id: uid(), text:"", done:false, indent:0, archived:false, archivedAt:null };
    p.items.push(newItem);
    p.sortUndo = null;
    saveNotebook();
    focusedId = newItem.id;
    render(focusedId);
  }

  function updateSortLabel(){
    const p = currentPage();
    sortBtn.textContent = (p.sortUndo && Array.isArray(p.sortUndo.ids) && p.sortUndo.ids.length) ? "Unsort" : "Sort A→Z";
  }

  // --- Today handling ---
  function findTodayPageId(){
    for (const [pid, pg] of Object.entries(notebook.pages)){
      if (String(pg.name || "").trim().toLowerCase() === "today") return pid;
    }
    return null;
  }
  function ensureTodayPage(){
    let pid = findTodayPageId();
    if (pid && notebook.pages[pid]) return pid;
    pid = uid();
    notebook.pages[pid] = {
      id: pid,
      name: "Today",
      category: UNCATEGORIZED,
      items: [{ id: uid(), text:"", done:false, indent:0, archived:false, archivedAt:null }],
      sortUndo: null
    };
    return pid;
  }
  function goToTodayPage(){
    const todayId = ensureTodayPage();
    switchPage(todayId);
    setView("active");
    toast("Today");
  }

  // Move block to Today and copy/paste kept as in your baseline
  function getVisibleBlock(list, startId){
    const startIdx = list.findIndex(x => x.id === startId);
    if (startIdx < 0) return { ids: [], nextFocusId: null };
    const startIndent = Number(list[startIdx].indent || 0);
    const block = [list[startIdx]];
    for (let i = startIdx + 1; i < list.length; i++){
      const ind = Number(list[i].indent || 0);
      if (ind > startIndent) block.push(list[i]);
      else break;
    }
    const after = list[startIdx + block.length];
    const before = list[startIdx - 1];
    return { ids: block.map(x => x.id), nextFocusId: after ? after.id : (before ? before.id : null) };
  }
  function insertIntoActiveSection(itemsArr, newItems){
    let idx = itemsArr.findIndex(x => x.archived);
    if (idx < 0) idx = itemsArr.length;
    itemsArr.splice(idx, 0, ...newItems);
  }
  function moveBlockToToday(startId){
    const source = currentPage();
    if (String(source.name || "").trim().toLowerCase() === "today"){ toast("Already Today"); return; }
    if (view !== "active"){ toast("Active only"); return; }

    const { ids, nextFocusId } = getVisibleBlock(visibleItems(), startId);
    if (!ids.length) return;

    const todayId = ensureTodayPage();
    const today = notebook.pages[todayId];

    const setIds = new Set(ids);
    const moving = [];
    source.items = source.items.filter(it => {
      if (setIds.has(it.id)){ moving.push(it); return false; }
      return true;
    });

    insertIntoActiveSection(today.items, moving);

    if (source.items.filter(x => !x.archived).length === 0){
      source.items.unshift({ id: uid(), text:"", done:false, indent:0, archived:false, archivedAt:null });
    }

    saveNotebook();
    focusedId = nextFocusId || source.items.find(x => !x.archived)?.id || source.items[0]?.id || null;
    render(focusedId);
    toast(`Moved ${moving.length}`);
  }

  async function writeClipboard(text){
    try{ await navigator.clipboard.writeText(text); return true; }
    catch(e){
      try{
        clipFallback.value = text;
        clipFallback.focus();
        clipFallback.select();
        return document.execCommand("copy");
      }catch(_){ return false; }
    }
  }
  async function readClipboard(){
    try{ return await navigator.clipboard.readText(); }
    catch(e){ return prompt("Paste tasks text here:") || ""; }
  }
  function formatTxtLine(it){
    const tabs = "\t".repeat(clamp(it.indent, 0, MAX_INDENT));
    const mark = it.done ? "[x] " : "[ ] ";
    return tabs + mark + (it.text || "");
  }
  function getActiveList(){
    return currentPage().items.filter(it => !it.archived);
  }
  function getBlockFromActive(startId){
    const list = getActiveList();
    const startIdx = list.findIndex(x => x.id === startId);
    if (startIdx < 0) return [];
    const startIndent = Number(list[startIdx].indent || 0);
    const block = [list[startIdx]];
    for (let i = startIdx + 1; i < list.length; i++){
      const ind = Number(list[i].indent || 0);
      if (ind > startIndent) block.push(list[i]);
      else break;
    }
    return block;
  }
  function blockToText(block){
    return block.map(formatTxtLine).join("\n") + "\n";
  }
  function textToItems(text){
    const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
    const out = [];
    for (let line of lines){
      if (!line || line.trim() === "") continue;

      let indent = 0;
      while (line.startsWith("\t")){ indent++; line = line.slice(1); }
      while (line.startsWith("  ")){ indent++; line = line.slice(2); }
      indent = clamp(indent, 0, MAX_INDENT);

      const trimmed = line.trimStart();
      let done = false;
      let textPart = trimmed;

      const m = trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
      if (m){
        done = (m[1].toLowerCase() === "x");
        textPart = m[2] ?? "";
      }
      out.push({ id: uid(), text: String(textPart), done, indent, archived:false, archivedAt:null });
    }
    return out;
  }
  function insertItemsBelowId(anchorId, newItems){
    if (!newItems.length) return;
    const p = currentPage();
    let insertIndex = p.items.findIndex(x => x.archived);
    if (insertIndex < 0) insertIndex = p.items.length;

    const gi = p.items.findIndex(x => x.id === anchorId);
    if (gi >= 0 && !p.items[gi].archived){
      const startIndent = Number(p.items[gi].indent || 0);
      let end = gi + 1;
      while (end < p.items.length){
        const next = p.items[end];
        if (next.archived) break;
        const ind = Number(next.indent || 0);
        if (ind > startIndent) end++;
        else break;
      }
      insertIndex = end;
    }
    p.items.splice(insertIndex, 0, ...newItems);
    p.sortUndo = null;
    saveNotebook();
    focusedId = newItems[0].id;
    render(focusedId);
  }

  async function doCopyById(rowId){
    if (view !== "active"){ toast("Active only"); return; }
    const block = getBlockFromActive(rowId);
    if (!block.length){ toast("Nothing"); return; }
    const ok = await writeClipboard(blockToText(block));
    toast(ok ? "Copied" : "Copy failed");
  }
  async function doPasteBelowId(rowId){
    if (view !== "active"){ toast("Active only"); return; }
    const text = await readClipboard();
    const items = textToItems(text);
    if (!items.length){ toast("Nothing"); return; }
    insertItemsBelowId(rowId, items);
    toast("Pasted");
  }

  // Search box wiring
  pageSearch.addEventListener("input", () => {
    railQuery = pageSearch.value || "";
    rebuildRail();
  });
  pageSearch.addEventListener("keydown", (e) => {
    if (e.key === "Escape"){
      e.preventDefault();
      pageSearch.value = "";
      railQuery = "";
      rebuildRail();
      pageSearch.blur();
    }
  });

  // Wire events
  toggleUi.addEventListener("click", toggleUiMode);
  newPageBtn.addEventListener("click", newPage);
  todayBtn.addEventListener("click", goToTodayPage);
  addRowBtn.addEventListener("click", addRow);

  // Init
  rebuildRail();
  focusedId = currentPage().items.find(x => !x.archived)?.id || currentPage().items[0]?.id || null;
  setView("active");
  updateSortLabel();
})();
</script>
</body>
