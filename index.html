<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tiny Todo</title>

  <style>
    :root{
      /* Paper palette */
      --paper: #fcfbf7;
      --paper-edge: #efece3;
      --paper-line: rgba(40, 60, 90, 0.08);

      /* Text */
      --text:#121212;
      --muted:#6a6a6a;

      /* Compact sizing */
      --row-h: 22px;
      --font: 13px;
      --pad-x: 4px;

      --check-col: 28px;
      --indent-step: 16px;
      --max-indent: 6;

      /* A6 width */
      --a6w: 105mm;
    }

    *{ box-sizing:border-box; }
    html, body{ height: 100%; }
    html{ -webkit-text-size-adjust: 100%; }

    body{
      margin:0;
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,0,0,0.05), transparent 55%),
        #f4f4f4;
    }

    header{
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(244,244,244,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 6px 0;
    }
    .header-inner{
      width: 100%;
      max-width: var(--a6w);
      margin: 0 auto;
      padding: 0 8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title{
      font-weight: 700;
      font-size: 13px;
      margin-right:auto;
      letter-spacing: 0.2px;
    }
    .tabs{ display:flex; gap:6px; align-items:center; }
    .tab{
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 999px;
      font: inherit;
      cursor:pointer;
      line-height: 1;
      color: var(--text);
    }
    .tab.active{
      border-color: rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.95);
      font-weight: 600;
    }

    .wrap{
      width: 100%;
      max-width: var(--a6w);
      margin: 0 auto;
      padding: 10px 8px 18px;
    }

    .paper{
      border: 1px solid var(--paper-edge);
      border-radius: 14px;
      overflow: hidden;
      background: var(--paper);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.08),
        0 2px 6px rgba(0,0,0,0.06);
    }

    .grid{
      position: relative;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0.0) 24px),
        linear-gradient(to right,
          transparent 0,
          transparent calc(var(--check-col) - 1px),
          rgba(40,60,90,0.10) calc(var(--check-col) - 1px),
          transparent var(--check-col)
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--paper-line) calc(var(--row-h) - 1px),
          var(--paper-line) var(--row-h)
        );
    }

    .row{
      display:grid;
      grid-template-columns: var(--check-col) 1fr;
      align-items:center;
      min-height: var(--row-h);
    }

    .cell{
      padding: 0 var(--pad-x);
      height: var(--row-h);
      display:flex;
      align-items:center;
      min-width: 0;
      background: transparent;
    }
    .cell.check{
      justify-content:center;
      border-right: 1px solid rgba(40,60,90,0.08);
    }

    input[type="checkbox"]{
      width: 14px;
      height: 14px;
      margin:0;
      accent-color:#222;
    }

    .task{
      width:100%;
      height: calc(var(--row-h) - 2px);
      border:none;
      outline:none;
      font: inherit;
      padding:0;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .done .task{ text-decoration: line-through; color:#777; }
    .archived .task{ color:#666; }

    .cell.text{
      padding-left: calc(var(--pad-x) + (var(--indent) * var(--indent-step)));
    }

    .bar{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap: wrap;
      align-items:center;
    }

    button.action{
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      padding: 6px 9px;
      border-radius: 12px;
      font: inherit;
      cursor:pointer;
      line-height: 1.1;
    }
    button.action:active{ transform: translateY(1px); }
    button.action.ghost{ background: rgba(255,255,255,0.55); }
    button.action.danger{ border-color: rgba(190, 80, 80, 0.35); }
    button.action:disabled{ opacity:0.45; cursor: default; }

    .small{
      font-size:12px;
      color: var(--muted);
      margin-left:auto;
    }

    .file{ display:none; }

    @media (max-width: 520px){
      :root{
        --row-h: 28px;
        --font: 15px;
        --pad-x: 6px;
        --check-col: 34px;
        --indent-step: 18px;
      }
      /* Prevent iOS Safari zoom-on-focus */
      .task{ font-size: 16px; }

      input[type="checkbox"]{ width: 16px; height: 16px; }
      button.action{ padding: 9px 12px; }
      header{ padding: 8px 0; }
      .header-inner, .wrap{ max-width: 100%; }
    }

    @media print{
      body{ background: #fff; }
      @page { size: A6; margin: 6mm; }
      header{ position: static; background:#fff; border-bottom:1px solid #ddd; }
      .paper{ box-shadow:none; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="title">Tiny Todo</div>
      <div class="tabs">
        <button class="tab" id="tabActive">Active</button>
        <button class="tab" id="tabArchive">Archive (<span id="archCount">0</span>)</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="paper">
      <div class="grid" id="grid" aria-label="todo grid"></div>
    </div>

    <div class="bar">
      <button class="action" id="add">+ Row</button>

      <!-- Active-only -->
      <button class="action ghost" id="archiveDone">Archive done</button>

      <!-- Archive-only -->
      <button class="action ghost" id="restoreFocused">Restore focused</button>
      <button class="action danger" id="deleteFocused">Delete focused</button>
      <button class="action danger" id="emptyArchive">Empty archive</button>

      <!-- JSON -->
      <button class="action" id="exportJson">Export JSON</button>
      <button class="action" id="importJson">Import JSON</button>

      <!-- TXT -->
      <button class="action" id="exportTxt">Export TXT</button>
      <button class="action" id="importTxt">Import TXT</button>

      <input class="file" id="fileJson" type="file" accept="application/json" />
      <input class="file" id="fileTxt" type="file" accept="text/plain,.txt" />

      <div class="small" id="status"></div>
    </div>
  </div>

  <script>
    // -----------------------------
    // Model + Storage
    // -----------------------------
    const KEY_V2 = "tiny_todo_v2";
    const KEY_V1 = "tiny_todo_v1";
    const MAX_INDENT = Number(getComputedStyle(document.documentElement).getPropertyValue("--max-indent")) || 6;

    // item: { id, text, done, indent, archived, archivedAt }
    let items = load() || seed();
    let view = "active"; // "active" | "archive"
    let focusedId = null;

    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const tabActive = document.getElementById("tabActive");
    const tabArchive = document.getElementById("tabArchive");
    const archCountEl = document.getElementById("archCount");

    const btnAdd = document.getElementById("add");
    const btnArchiveDone = document.getElementById("archiveDone");
    const btnRestoreFocused = document.getElementById("restoreFocused");
    const btnDeleteFocused = document.getElementById("deleteFocused");
    const btnEmptyArchive = document.getElementById("emptyArchive");

    const btnExportJson = document.getElementById("exportJson");
    const btnImportJson = document.getElementById("importJson");
    const btnExportTxt  = document.getElementById("exportTxt");
    const btnImportTxt  = document.getElementById("importTxt");

    const fileJson = document.getElementById("fileJson");
    const fileTxt  = document.getElementById("fileTxt");

    function seed(){
      return [
        { id: uid(), text: "Task", done: false, indent: 0, archived: false, archivedAt: null },
        { id: uid(), text: "Subtask (Tab to indent)", done: false, indent: 1, archived: false, archivedAt: null },
      ];
    }

    function uid(){
      return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

    function normalize(raw){
      if (!Array.isArray(raw)) return null;
      return raw.map(x => ({
        id: x.id || uid(),
        text: String(x.text || ""),
        done: !!x.done,
        indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
        archived: !!x.archived,
        archivedAt: x.archivedAt || (x.archived ? Date.now() : null)
      }));
    }

    function load(){
      try{
        const raw2 = localStorage.getItem(KEY_V2);
        if (raw2){
          const parsed = JSON.parse(raw2);
          const norm = normalize(parsed);
          if (norm) return norm;
        }

        // Migrate v1 -> v2
        const raw1 = localStorage.getItem(KEY_V1);
        if (raw1){
          const parsed1 = JSON.parse(raw1);
          if (Array.isArray(parsed1)){
            const migrated = parsed1.map(x => ({
              id: x.id || uid(),
              text: String(x.text || ""),
              done: !!x.done,
              indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
              archived: false,
              archivedAt: null
            }));
            localStorage.setItem(KEY_V2, JSON.stringify(migrated));
            return migrated;
          }
        }
        return null;
      }catch(e){
        return null;
      }
    }

    function save(){
      localStorage.setItem(KEY_V2, JSON.stringify(items));
      status("Saved");
      updateCounts();
    }

    let statusTimer;
    function status(msg){
      statusEl.textContent = msg;
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusEl.textContent = "", 900);
    }

    // -----------------------------
    // View + Rendering
    // -----------------------------
    function setView(v){
      view = v;
      tabActive.classList.toggle("active", view === "active");
      tabArchive.classList.toggle("active", view === "archive");

      const inActive = view === "active";
      btnAdd.disabled = !inActive;
      btnArchiveDone.style.display = inActive ? "" : "none";

      btnRestoreFocused.style.display = inActive ? "none" : "";
      btnDeleteFocused.style.display  = inActive ? "none" : "";
      btnEmptyArchive.style.display   = inActive ? "none" : "";

      render(focusedId);
    }

    function visibleItems(){
      return items.filter(it => view === "active" ? !it.archived : it.archived);
    }

    function updateCounts(){
      archCountEl.textContent = String(items.filter(x => x.archived).length);
    }

    function render(tryFocusId){
      const vis = visibleItems();
      grid.innerHTML = "";

      if (view === "active" && vis.length === 0){
        const newItem = { id: uid(), text: "", done: false, indent: 0, archived: false, archivedAt: null };
        items.push(newItem);
        save();
      }

      const list = visibleItems();

      list.forEach((it, idx) => {
        const row = document.createElement("div");
        row.className = "row" + (it.done ? " done" : "") + (it.archived ? " archived" : "");
        row.dataset.id = it.id;
        row.dataset.index = String(idx);

        const cellCheck = document.createElement("div");
        cellCheck.className = "cell check";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!it.done;
        cb.addEventListener("change", () => {
          it.done = cb.checked;
          save();
          render(it.id);
        });
        cellCheck.appendChild(cb);

        const cellText = document.createElement("div");
        cellText.className = "cell text";
        cellText.style.setProperty("--indent", clamp(it.indent, 0, MAX_INDENT));

        const input = document.createElement("input");
        input.className = "task";
        input.value = it.text || "";
        input.placeholder = (view === "active" && idx === 0 && !it.text) ? "Type a task..." : "";
        input.spellcheck = false;
        input.autocomplete = "off";

        input.addEventListener("focus", () => focusedId = it.id);
        input.addEventListener("input", () => { it.text = input.value; save(); });
        input.addEventListener("keydown", (e) => onKey(e, it.id));

        cellText.appendChild(input);
        row.appendChild(cellCheck);
        row.appendChild(cellText);
        grid.appendChild(row);
      });

      updateCounts();

      if (tryFocusId){
        const el = grid.querySelector(`.row[data-id="${tryFocusId}"] .task`);
        if (el){
          el.focus();
          const v = el.value;
          el.setSelectionRange(v.length, v.length);
        } else {
          const first = grid.querySelector(".row .task");
          if (first) first.focus();
        }
      }
    }

    function getItemById(id){ return items.find(x => x.id === id) || null; }
    function focusIndex(i){
      const el = grid.querySelector(`.row[data-index="${i}"] .task`);
      if (el) el.focus();
    }

    // -----------------------------
    // Keyboard
    // -----------------------------
    function onKey(e, id){
      const it = getItemById(id);
      if (!it) return;

      const list = visibleItems();
      const idx = list.findIndex(x => x.id === id);
      const input = e.target;
      const canAddRows = (view === "active");

      if ((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        it.done = !it.done;
        save();
        render(it.id);
        return;
      }

      if (e.key === "Enter"){
        if (!canAddRows) return;
        e.preventDefault();

        const newItem = { id: uid(), text: "", done: false, indent: it.indent, archived: false, archivedAt: null };
        const globalIndex = items.findIndex(x => x.id === it.id);
        items.splice(globalIndex + 1, 0, newItem);

        save();
        render(newItem.id);
        return;
      }

      if (e.key === "Tab"){
        e.preventDefault();
        it.indent = e.shiftKey
          ? clamp(it.indent - 1, 0, MAX_INDENT)
          : clamp(it.indent + 1, 0, MAX_INDENT);
        save();
        render(it.id);
        return;
      }

      if (e.key === "Backspace"){
        if (input.value === "" && list.length > 1){
          e.preventDefault();
          const globalIndex = items.findIndex(x => x.id === it.id);
          items.splice(globalIndex, 1);
          save();

          const prevIdx = Math.max(0, idx - 1);
          const after = visibleItems()[prevIdx];
          render(after ? after.id : null);
          return;
        }
      }

      if (e.key === "ArrowUp"){
        const atStart = input.selectionStart === 0 && input.selectionEnd === 0;
        if (atStart || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.max(0, idx - 1));
        }
      }

      if (e.key === "ArrowDown"){
        const atEnd = input.selectionStart === input.value.length && input.selectionEnd === input.value.length;
        if (atEnd || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.min(list.length - 1, idx + 1));
        }
      }
    }

    // -----------------------------
    // Archive / Restore / Delete
    // -----------------------------
    function archiveDone(){
      const toArchive = items.filter(x => !x.archived && x.done);
      if (toArchive.length === 0){ status("No done tasks"); return; }
      const now = Date.now();
      toArchive.forEach(x => { x.archived = true; x.archivedAt = now; });
      save();

      const remaining = items.filter(x => !x.archived);
      focusedId = remaining[0]?.id || null;
      render(focusedId);
      status(`Archived ${toArchive.length}`);
    }

    function restoreFocused(){
      if (!focusedId){ status("No focus"); return; }
      const it = getItemById(focusedId);
      if (!it || !it.archived){ status("Focus an archived task"); return; }
      it.archived = false;
      it.archivedAt = null;
      save();
      status("Restored");
      render(it.id);
    }

    function deleteFocused(){
      if (!focusedId){ status("No focus"); return; }
      const it = getItemById(focusedId);
      if (!it || !it.archived){ status("Focus an archived task"); return; }
      items = items.filter(x => x.id !== it.id);
      save();
      status("Deleted");
      focusedId = visibleItems()[0]?.id || null;
      render(focusedId);
    }

    function emptyArchive(){
      const count = items.filter(x => x.archived).length;
      if (count === 0){ status("Archive empty"); return; }
      if (!confirm(`Permanently delete ${count} archived item(s)?`)) return;

      items = items.filter(x => !x.archived);
      save();
      status("Archive emptied");
      focusedId = visibleItems()[0]?.id || null;
      render(focusedId);
    }

    // -----------------------------
    // JSON Export / Import
    // -----------------------------
    function exportJson(){
      const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
      downloadBlob(blob, `tiny-todo-${new Date().toISOString().slice(0,10)}.json`);
    }

    async function importJsonFile(f){
      const text = await f.text();
      const data = JSON.parse(text);
      const norm = normalize(data);
      if (!norm) throw new Error("Invalid JSON file");
      items = norm.length ? norm : seed();
      save();
      focusedId = items.find(x => !x.archived)?.id || items[0]?.id || null;
      setView("active");
      status("Imported JSON");
    }

    // -----------------------------
    // TXT Export / Import (Plain Text)
    // -----------------------------
    const ARCHIVE_MARKER = "--- ARCHIVE ---";

    function toPlainText(){
      const lines = [];

      const active = items.filter(x => !x.archived);
      const archived = items.filter(x => x.archived);

      for (const it of active){
        lines.push(formatTxtLine(it));
      }

      if (archived.length){
        lines.push(ARCHIVE_MARKER);
        for (const it of archived){
          lines.push(formatTxtLine(it));
        }
      }

      // trailing newline is nice for editors
      return lines.join("\n") + "\n";
    }

    function formatTxtLine(it){
      const tabs = "\t".repeat(clamp(it.indent, 0, MAX_INDENT));
      const mark = it.done ? "[x] " : "[ ] ";
      return tabs + mark + (it.text || "");
    }

    function fromPlainText(text){
      const rawLines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");

      let inArchive = false;
      const out = [];

      for (let line of rawLines){
        // ignore completely blank lines
        if (!line || line.trim() === "") continue;

        if (line.trim() === ARCHIVE_MARKER){
          inArchive = true;
          continue;
        }

        // Count leading tabs OR groups of 2 spaces (optional)
        let indent = 0;

        // tabs first
        while (line.startsWith("\t")){
          indent++;
          line = line.slice(1);
        }
        // optional: treat leading 2-spaces as one indent (helps if user edits in some apps)
        while (line.startsWith("  ")){
          indent++;
          line = line.slice(2);
        }

        indent = clamp(indent, 0, MAX_INDENT);

        // Parse checkbox
        const trimmed = line.trimStart();
        let done = false;
        let textPart = trimmed;

        const m = trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
        if (m){
          done = (m[1].toLowerCase() === "x");
          textPart = m[2] ?? "";
        } else {
          // If no [ ] marker, treat whole line as text (not done)
          done = false;
          textPart = trimmed;
        }

        out.push({
          id: uid(),
          text: String(textPart),
          done,
          indent,
          archived: inArchive,
          archivedAt: inArchive ? Date.now() : null
        });
      }

      // Ensure at least one active row
      if (out.filter(x => !x.archived).length === 0){
        out.unshift({ id: uid(), text: "", done: false, indent: 0, archived: false, archivedAt: null });
      }

      return out;
    }

    function exportTxt(){
      const txt = toPlainText();
      const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
      downloadBlob(blob, `tiny-todo-${new Date().toISOString().slice(0,10)}.txt`);
    }

    async function importTxtFile(f){
      const text = await f.text();
      items = fromPlainText(text);
      save();
      focusedId = items.find(x => !x.archived)?.id || items[0]?.id || null;
      setView("active");
      status("Imported TXT");
    }

    function downloadBlob(blob, filename){
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // -----------------------------
    // Wire up UI
    // -----------------------------
    tabActive.addEventListener("click", () => setView("active"));
    tabArchive.addEventListener("click", () => setView("archive"));

    btnAdd.addEventListener("click", () => {
      if (view !== "active") return;
      const newItem = { id: uid(), text: "", done: false, indent: 0, archived: false, archivedAt: null };
      items.push(newItem);
      save();
      focusedId = newItem.id;
      render(newItem.id);
    });

    btnArchiveDone.addEventListener("click", archiveDone);
    btnRestoreFocused.addEventListener("click", restoreFocused);
    btnDeleteFocused.addEventListener("click", deleteFocused);
    btnEmptyArchive.addEventListener("click", emptyArchive);

    btnExportJson.addEventListener("click", exportJson);
    btnImportJson.addEventListener("click", () => fileJson.click());
    fileJson.addEventListener("change", async () => {
      const f = fileJson.files[0];
      if (!f) return;
      try{ await importJsonFile(f); }
      catch(e){ alert("Import JSON failed: " + e.message); }
      finally{ fileJson.value = ""; }
    });

    btnExportTxt.addEventListener("click", exportTxt);
    btnImportTxt.addEventListener("click", () => fileTxt.click());
    fileTxt.addEventListener("change", async () => {
      const f = fileTxt.files[0];
      if (!f) return;
      try{ await importTxtFile(f); }
      catch(e){ alert("Import TXT failed: " + e.message); }
      finally{ fileTxt.value = ""; }
    });

    // Init
    focusedId = items.find(x => !x.archived)?.id || items[0]?.id || null;
    setView("active");
  </script>
</body>
</html>
