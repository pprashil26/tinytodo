<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tiny Todo</title>

<style>
:root{
  --paper:#fcfbf7; --paper-line:rgba(40,60,90,.08);
  --text:#111; --muted:rgba(0,0,0,.45);

  --row-h:22px; --font:13px; --pad-x:4px;

  /* widened to fit checkbox + ‼️ */
  --check-col:46px;
  --act-col:66px; /* ⧉ ⎘ → */
  --indent-step:16px; --max-indent:6;

  --page-w:148mm; --sidebar-w:185px; --gap:12px;

  --rail-w:170px; --rail-font:12px; --rail-color:rgba(0,0,0,.40); --rail-color-active:rgba(0,0,0,.72);
  --rail-head-color:rgba(0,0,0,.42); --rail-border:rgba(0,0,0,.08);

  --search-w:250px;

  /* Important signifier */
  --imp-on:rgba(190,0,0,.95); --imp-off:rgba(0,0,0,.22); --imp-bg:rgba(190,0,0,.08);

  /* Expand preview */
  --exp-off: rgba(0,0,0,.25);
  --exp-on: rgba(0,0,0,.70);
  --exp-preview: rgba(0,0,0,.62);

  /* Mobile drawer */
  --drawer-bg: rgba(255,255,255,.96);
  --drawer-border: rgba(0,0,0,.10);
  --drawer-shadow: 0 18px 40px rgba(0,0,0,.16);
  --backdrop: rgba(0,0,0,.18);
}

*{box-sizing:border-box}
html,body{height:100%}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:var(--font);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  background:radial-gradient(1200px 600px at 50% -200px, rgba(0,0,0,.05), transparent 55%),#f4f4f4;
}

button{font:inherit;background:none;border:none;padding:0;margin:0;color:var(--muted);cursor:pointer;line-height:1.1}
button:hover{color:rgba(0,0,0,.85)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.35;cursor:default;transform:none}

input[type="file"]{display:none!important}

/* Header */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(244,244,244,.9);
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.header-inner{
  width:100%;max-width:var(--page-w);
  margin:0 auto;padding:6px 8px;
  display:flex;align-items:center;justify-content:center;
  gap:10px;flex-wrap:nowrap;white-space:nowrap;
}
.title{font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;color:rgba(0,0,0,.65)}
.page-search{
  width:var(--search-w);max-width:60vw;
  border:1px solid rgba(0,0,0,.12);
  border-radius:999px;padding:4px 10px;
  background:rgba(255,255,255,.85);
  font:inherit;color:rgba(0,0,0,.75);outline:none;height:26px;
}
.page-search::placeholder{color:rgba(0,0,0,.35)}
.filter-important{
  font-size:12px;padding:2px 8px;border-radius:999px;
  border:1px solid rgba(0,0,0,.14);
  color:rgba(0,0,0,.50);
  background:rgba(255,255,255,.55);
  line-height:1.2;
}
.filter-important.active{
  border-color:rgba(190,0,0,.35);
  background:var(--imp-bg);
  color:rgba(150,0,0,.85);
}

/* Mobile header icon buttons (hidden on desktop) */
.mob-btn{
  display:none;
  width:30px;height:30px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,.10);
  background:rgba(255,255,255,.65);
  color:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  font-size:16px;
  line-height:1;
  padding:0;
}
.mob-btn:hover{color:rgba(0,0,0,.85)}
.mob-btn:active{transform:translateY(1px)}

/* Layout */
.wrap{
  width:100%;
  max-width:calc(var(--page-w) + var(--rail-w) + (var(--gap)*2));
  margin:0 auto;
  padding:10px 8px 18px;
  display:flex;gap:var(--gap);
  align-items:flex-start;
  justify-content:center;
}

/* =========================================================
   PAGE SIZE + RIGHT PANEL TOGGLES (UI ONLY)
   ========================================================= */

/* Page size states (default stays A5 because your :root has --page-w:148mm) */
body.size-a4{ --page-w:210mm; }  /* A4 portrait width */
body.size-a5{ --page-w:148mm; }  /* A5 portrait width */

/* Collapse the right panel (desktop) */
body.right-collapsed .right-col{ display:none; }

/* When right panel collapsed, reclaim the width */
body.right-collapsed .wrap{
  max-width:calc(var(--page-w) + (var(--gap)*2));
}

/* NEW: Right column stacks Pages + Menu */
.right-col{
  width:var(--rail-w);
  flex:0 0 var(--rail-w);
  position:sticky;
  top:56px;
  align-self:flex-start;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* When sidebar is inside right column, it should fill the column */
.right-col .sidebar{
  width:100%;
  flex:0 0 auto;
  position:static;
  top:auto;
}

/* Pages rail is no longer the outer sticky rail; it becomes normal inside right-col */
.right-col .pages-rail{
  width:100%;
  flex:0 0 auto;
  position:static;
  top:auto;
}


.sidebar{width:var(--sidebar-w);flex:0 0 var(--sidebar-w);position:sticky;top:56px;align-self:flex-start}
.main{width:100%;max-width:var(--page-w)}

/* Sidebar */
.side-block{border:1px solid rgba(0,0,0,.08);border-radius:12px;background:rgba(255,255,255,.55);padding:8px}
details.group{border-top:1px solid rgba(0,0,0,.08);padding-top:8px;margin-top:8px}
details.group:first-child{border-top:none;padding-top:0;margin-top:0}

/* Left headings match right rail subtle grey */
summary.group-sum{
  list-style:none;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  user-select:none;color:var(--rail-head-color);font-weight:600;
}
summary.group-sum::-webkit-details-marker{display:none}
summary.group-sum::after{content:"›";transform:rotate(90deg);opacity:.65}
details[open] summary.group-sum::after{transform:rotate(-90deg)}
.group-body{margin-top:8px;display:flex;flex-direction:column;gap:8px}

/* Small pill button (matches your minimalist style) */
.tiny-pill{
  font-size:12px;
  padding:2px 8px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.14);
  color:rgba(0,0,0,.50);
  background:rgba(255,255,255,.55);
  line-height:1.2;
}
.tiny-pill.active{
  border-color:rgba(0,0,0,.28);
  background:rgba(0,0,0,.06);
  color:rgba(0,0,0,.78);
}

/* =========================================================
   HIDE CHECKBOX ONLY (per page): keep text editable + keep ‼️
   ========================================================= */

/* Keep the same layout columns */
body.no-checks .row,
body.no-checks .expandRow{
  grid-template-columns: var(--check-col) 1fr var(--act-col);
}

/* Hide ONLY the checkbox input, keep important button visible */
body.no-checks input[type="checkbox"]{
  opacity:0;
  pointer-events:none;
  width:0;
  height:0;
  margin:0;
}

/* Tidy spacing inside check cell (optional but helps) */
body.no-checks .cell.check > div{
  gap:0 !important;
}

/* Optional: keep ruled look by removing the vertical checkbox divider line */
body.no-checks .grid{
  background:
    linear-gradient(to bottom, rgba(255,255,255,.55), rgba(255,255,255,0) 24px),
    repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--row-h) - 1px), var(--paper-line) calc(var(--row-h) - 1px), var(--paper-line) var(--row-h));
}

/* Paper/Grid */
.paper{border:1px solid rgba(0,0,0,.10);border-radius:14px;overflow:hidden;background:var(--paper);box-shadow:0 10px 24px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.06)}
.grid{
  position:relative;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.55), rgba(255,255,255,0) 24px),
    linear-gradient(to right, transparent 0, transparent calc(var(--check-col) - 1px), rgba(40,60,90,.10) calc(var(--check-col) - 1px), transparent var(--check-col)),
    repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--row-h) - 1px), var(--paper-line) calc(var(--row-h) - 1px), var(--paper-line) var(--row-h));
}
.row{display:grid;grid-template-columns:var(--check-col) 1fr var(--act-col);align-items:center;min-height:var(--row-h)}
.cell{padding:0 var(--pad-x);height:var(--row-h);display:flex;align-items:center;min-width:0}
.cell.check{justify-content:center;border-right:1px solid rgba(40,60,90,.08)}
.cell.text{padding-left:calc(var(--pad-x) + (var(--indentLevel) * var(--indent-step)));position:relative}
.cell.act{justify-content:flex-end;gap:4px;border-left:1px solid rgba(40,60,90,.06);padding-right:6px}

input[type="checkbox"]{width:14px;height:14px;margin:0;accent-color:#222}
.task{
  width:100%;
  height:calc(var(--row-h) - 2px);
  border:none;outline:none;background:transparent;font:inherit;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding-right:20px; /* space for chevron */
}
.done .task{text-decoration:line-through;color:#777}
.archivedRow .task{color:#666}
.mini-act{font-size:12px;color:rgba(0,0,0,.42);line-height:1;padding:0 1px}
.mini-act:hover{color:rgba(0,0,0,.85)}
.mini-act:disabled{opacity:.25}

/* Important signifier */
.imp-btn{font-size:13px;line-height:1;padding:0;margin-left:2px;color:var(--imp-off);user-select:none}
.imp-btn.active{color:var(--imp-on)}
.imp-btn:hover{color:var(--imp-on)}

/* Expand chevron */
.exp-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--exp-off);padding:0 1px}
.exp-btn:hover{color:var(--exp-on)}
.exp-btn.active{color:var(--exp-on)}

/* Expanded preview row */
.expandRow{display:grid;grid-template-columns:var(--check-col) 1fr var(--act-col);align-items:stretch}
.expandRow .cell{height:auto;align-items:flex-start;padding-top:4px;padding-bottom:8px}
.expandRow .cell.check{border-right:1px solid rgba(40,60,90,.08)}
.expandRow .cell.act{border-left:1px solid rgba(40,60,90,.06)}
.previewText{width:100%;color:var(--exp-preview);font-size:12px;line-height:1.35;white-space:pre-wrap;word-break:break-word}

/* Bottom */
.bottom-actions{display:flex;justify-content:center;gap:14px;align-items:center;margin-top:10px;padding:0 2px;font-size:12px}

/* Rail */
.pages-rail{width:var(--rail-w);flex:0 0 var(--rail-w);position:sticky;top:56px;align-self:flex-start;font-size:var(--rail-font);color:var(--rail-color);user-select:none}
.pages-rail .rail-title{font-weight:600;color:rgba(0,0,0,.45);margin:6px 0 8px;letter-spacing:.2px}
.rail-groups{max-height:calc(100vh - 110px);overflow:auto;padding-right:4px;display:flex;flex-direction:column;gap:8px}
.rail-groups::-webkit-scrollbar{width:6px}
.rail-groups::-webkit-scrollbar-thumb{background:rgba(0,0,0,.10);border-radius:999px}
details.rail-cat{border-top:1px solid var(--rail-border);padding-top:6px}
details.rail-cat:first-child{border-top:none;padding-top:0}
details.rail-cat>summary{list-style:none;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;color:var(--rail-head-color);font-weight:600;gap:8px}
details.rail-cat>summary::-webkit-details-marker{display:none}
details.rail-cat>summary::after{content:"›";transform:rotate(90deg);opacity:.65;font-size:14px;line-height:1;flex:0 0 auto}
details.rail-cat[open]>summary::after{transform:rotate(-90deg)}
.rail-pages{margin-top:6px;display:flex;flex-direction:column;gap:6px}
.page-row{display:flex;align-items:center;gap:6px;min-width:0}
.page-link{text-align:left;font-size:var(--rail-font);color:var(--rail-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
.page-link.active{color:var(--rail-color-active);font-weight:600}
.page-rename{flex:0 0 auto;font-size:12px;color:rgba(0,0,0,.30);line-height:1}
.page-rename:hover{color:rgba(0,0,0,.75)}

/* Results mode */
.results-cat{border-top:1px solid var(--rail-border);padding-top:6px}
.results-cat:first-child{border-top:none;padding-top:0}
.results-cat-title{font-weight:700;color:rgba(0,0,0,.45);margin-bottom:6px}
.results-page{margin:6px 0 10px;padding-left:2px}
.results-page-title{font-weight:600;color:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px}
.results-page-title .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto;min-width:0;text-align:left}
.results-page-title .jump{color:rgba(0,0,0,.30);font-size:11px;flex:0 0 auto}
.results-page-title .jump:hover{color:rgba(0,0,0,.75)}
.result-item{display:block;text-align:left;width:100%;color:rgba(0,0,0,.45);font-size:12px;line-height:1.25;white-space:normal;overflow:visible;text-overflow:unset;word-break:break-word;padding:0;margin:0 0 6px 0}
.result-item:hover{color:rgba(0,0,0,.85)}
.result-meta{color:rgba(0,0,0,.25);font-size:10px;margin-right:6px}
.rail-empty{color:rgba(0,0,0,.35);font-size:11px;margin-top:6px}

/* Help icon (minimal) */
#helpBtn{ font-size:14px; color:var(--muted); padding:0; line-height:1.1; }
#helpBtn:hover{ color:rgba(0,0,0,.85); }

/* Help modal */
#helpBackdrop{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.18);
  z-index:80;
}
#helpModal{
  display:none; position:fixed; inset:0;
  z-index:90; padding:14px; overflow:auto;
}
#helpModal.open, #helpBackdrop.open{ display:block; }

.help-card{
  max-width:min(720px, 92vw);
  margin:60px auto;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.12);
  border-radius:16px;
  box-shadow:0 18px 40px rgba(0,0,0,.16);
  padding:10px 12px;
}
.help-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.help-title{ font-weight:700; color:rgba(0,0,0,.55); }
.help-x{ font-size:12px; color:rgba(0,0,0,.35); }
.help-x:hover{ color:rgba(0,0,0,.85); }

.help-details > summary{ cursor:pointer; user-select:none; color:rgba(0,0,0,.50); font-weight:600; margin-bottom:8px; }

.help-pre{
  margin:0;
  white-space:pre-wrap;
  word-break:break-word;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  font-size:12px;
  color:rgba(0,0,0,.70);
  line-height:1.35;
}

/* Toast */
#toast{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.12);border-radius:999px;padding:6px 10px;font-size:12px;color:#222;box-shadow:0 10px 24px rgba(0,0,0,.10);display:none;z-index:60;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Backdrop for mobile drawers */
#backdrop{
  display:none;
  position:fixed;
  inset:0;
  background:var(--backdrop);
  z-index:45;
}

/* =========================================================
   MOBILE RESPONSIVE (UI ONLY)
   ========================================================= */
/* =========================================================
   MOBILE RESPONSIVE (UI ONLY)
   ========================================================= */
@media (max-width: 768px){
  /* Hide left menu button on mobile */
  #mobLeftBtn{ display:none !important; }

  /* mobile-only header buttons */
  .mob-btn{ display:inline-flex; }

  /* --- MOBILE HEADER: 2-row layout that always fits --- */
  .header-inner{
    max-width:100%;
    padding:6px 10px;
    justify-content:flex-start;
    flex-wrap:wrap;
    gap:6px 8px;
    white-space:normal;
  }

  /* Row 1 */
  #toggleUi{
    order:2;
    flex:1 1 auto;
    text-align:center;
    font-size:14px;
    margin-left:0;
    margin-right:0;
  }
  #mobRightBtn{ order:3; }

  /* Row 2: Search full width */
  #pageSearch{
    order:10;
    flex:1 1 100%;
    max-width:100%;
    width:100%;
  }

  /* Row 2 buttons */
  #newPage,#todayBtn,#importantFilterBtn{
    order:11;
    flex:0 0 auto;
    font-size:13px;
    padding:2px 6px;
    white-space:nowrap;
  }

  /* Make app feel native: bigger typography + row height */
  :root{
    --row-h:30px;
    --font:15px;
    --pad-x:6px;
    --act-col:74px;
    --check-col:58px;
    --search-w:160px;
  }
  .task{ font-size:16px; } /* avoid iOS zoom */

  /* wrap full width */
  .wrap{ max-width:100%; padding:10px 10px 18px; }

  /* Drawer panel is now the right column (Pages + Menu) */
  .right-col{
    position:fixed;
    top:56px;
    bottom:10px;
    right:10px;
    width:min(86vw, 320px);
    max-height:unset;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    background:var(--drawer-bg);
    border:1px solid var(--drawer-border);
    border-radius:18px;
    box-shadow:var(--drawer-shadow);
    z-index:50;
    transform:translateX(calc(100% + 14px));
    transition:transform 160ms ease;
    padding:10px;
  }

  .right-col .pages-rail,
  .right-col .sidebar{
    position:static;
    width:100%;
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;
    padding:0;
  }

  body.right-open .right-col{ transform:translateX(0); }
  body.right-open #backdrop{ display:block; }

  body.right-open{
    overflow:hidden;
    touch-action:none;
  }

  .main{ max-width:100%; }
}

/* Existing compact mode kept (desktop), mobile drawers override anyway */
body.compact .sidebar{display:none}
body.compact .wrap{display:flex;max-width:calc(var(--page-w) + var(--rail-w) + var(--gap))}
body.compact .main{margin:0;max-width:var(--page-w)}
body.compact .pages-rail{position:fixed;right:10px;top:62px;width:var(--rail-w);max-height:calc(100vh - 80px);background:transparent;padding:0;z-index:15}
body.compact .wrap{justify-content:center;padding-right:calc(var(--rail-w) + 14px)}
</style>
</head>

<body>
<header>
  <div class="header-inner">
    <!-- Mobile UI buttons (UI only) -->
    <button type="button" class="mob-btn" id="mobLeftBtn" aria-label="Open menu" title="Menu">☰</button>

    <span class="title" id="toggleUi" title="Tap to hide/show sidebar">Tiny Todo</span>

    <input id="pageSearch" class="page-search" type="text" placeholder="Search pages…" autocomplete="off"/>

    <button type="button" id="newPage">+ Page</button>
    <button type="button" id="todayBtn" title="Go to Today">Today</button>
    <button type="button" id="importantFilterBtn" class="filter-important" title="Show only important (‼️) tasks">‼️ Only</button>
<button type="button" id="pageSizeBtn" title="Toggle page size A5/A4">A4</button>
<button type="button" id="toggleRightPanelBtn" title="Hide/show right panel">Hide Panel</button>
<button type="button" id="helpBtn" title="Help">❔</button>
    <button type="button" class="mob-btn" id="mobRightBtn" aria-label="Open pages" title="Pages">📄</button>
  </div>
</header>

<div id="backdrop" aria-hidden="true"></div>
<div id="toast"></div>
<div id="helpBackdrop" aria-hidden="true"></div>

<div id="helpModal" role="dialog" aria-modal="true" aria-label="Help">
  <div class="help-card">
    <div class="help-head">
      <div class="help-title">Help</div>
      <button type="button" id="helpClose" class="help-x" title="Close">✕</button>
    </div>

    <details open class="help-details">
      <summary>README</summary>
      <pre id="helpContent" class="help-pre">Loading…</pre>
    </details>
  </div>
</div>

<div class="wrap">
  <main class="main">
    <div class="paper">
      <div class="grid" id="grid" aria-label="todo grid"></div>
    </div>

 <div class="bottom-actions">
  <button type="button" id="addRowBtn">+ Row</button>
  <button type="button" id="sortBtn">Sort A→Z</button>
  <button type="button" id="toggleChecksBtn" class="tiny-pill" title="Toggle checkboxes for this page">☑︎</button>
</div>

    <input id="fileJson" type="file" accept="application/json">
    <input id="fileTxt" type="file" accept="text/plain,.txt">
    <input id="fileAll" type="file" accept="application/json">
    <input id="fileAllTxt" type="file" accept="text/plain,.txt">
    <textarea id="clipFallback" aria-hidden="true"
      style="position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none"></textarea>
  </main>

  <!-- NEW: Right column wrapper -->
  <aside class="right-col" aria-label="Pages and menu">
    <div class="pages-rail" aria-label="Pages rail">
      <div class="rail-title" id="railTitle">Pages</div>
      <div class="rail-groups" id="pagesRail"></div>
    </div>

    <!-- MOVED: Sidebar content under Pages -->
    <div class="sidebar">
      <div class="side-block">
        <details class="group" open>
          <summary class="group-sum">Backup</summary>
          <div class="group-body">
            <button type="button" id="exportJsonBtn">Export JSON</button>
            <button type="button" id="importJsonBtn">Import JSON</button>
            <button type="button" id="exportTxtBtn">Export TXT</button>
            <button type="button" id="importTxtBtn">Import TXT</button>
            <button type="button" id="backupAllBtn">Backup ALL</button>
            <button type="button" id="restoreAllBtn">Restore ALL</button>
            <button type="button" id="backupAllTxtBtn">Backup ALL (TXT)</button>
            <button type="button" id="restoreAllTxtBtn">Restore ALL (TXT)</button>
          </div>
        </details>

        <details class="group">
          <summary class="group-sum">Archive</summary>
          <div class="group-body">
            <button type="button" id="archiveDoneBtn">Archive done</button>
            <button type="button" id="restoreFocusedBtn">Restore focused</button>
            <button type="button" id="deleteFocusedBtn">Delete focused</button>
            <button type="button" id="emptyArchiveBtn">Empty archive</button>
          </div>
        </details>

        <details class="group">
          <summary class="group-sum">Page / View</summary>
          <div class="group-body">
            <button type="button" id="viewActiveBtn">Active</button>
            <button type="button" id="viewArchiveBtn">Archive</button>
            <button type="button" id="deletePageBtn">Delete Page</button>
          </div>
        </details>

        <div style="margin-top:10px;color:var(--muted);font-size:12px" id="status"></div>
      </div>
    </div>
  </aside>
</div>

<script>
(() => {
  const KEY_V3="tiny_todo_v3_pages", KEY_V2="tiny_todo_v2", KEY_V1="tiny_todo_v1", UI_KEY="tiny_todo_ui_compact";
  const RAIL_KEY_PREFIX="tiny_todo_rail_closed::", UNCATEGORIZED="Uncategorized", ARCHIVE_MARKER="--- ARCHIVE ---";
  const FILTER_KEY="tiny_todo_filter_important_only";
  const MAX_INDENT=Number(getComputedStyle(document.documentElement).getPropertyValue("--max-indent"))||6;

  const SIZE_KEY="tiny_todo_page_size";         // "a5" or "a4"
  const RIGHT_COLLAPSE_KEY="tiny_todo_right_collapsed"; // "1" or "0"

  const body=document.body;
  const toggleUi=document.getElementById("toggleUi");
  const backdrop=document.getElementById("backdrop");

  const toastEl=document.getElementById("toast");
  const statusEl=document.getElementById("status");

  const pageSearch=document.getElementById("pageSearch");
  const railTitle=document.getElementById("railTitle");
  const pagesRail=document.getElementById("pagesRail");

  const newPageBtn=document.getElementById("newPage");
  const todayBtn=document.getElementById("todayBtn");
  const importantFilterBtn=document.getElementById("importantFilterBtn");
  
  const pageSizeBtn=document.getElementById("pageSizeBtn");
  const toggleRightPanelBtn=document.getElementById("toggleRightPanelBtn");

  const mobLeftBtn=document.getElementById("mobLeftBtn");
  const mobRightBtn=document.getElementById("mobRightBtn");

  const grid=document.getElementById("grid");
  const addRowBtn=document.getElementById("addRowBtn");
  const sortBtn=document.getElementById("sortBtn");
  
  const toggleChecksBtn=document.getElementById("toggleChecksBtn");

  const exportJsonBtn=document.getElementById("exportJsonBtn");
  const importJsonBtn=document.getElementById("importJsonBtn");
  const exportTxtBtn=document.getElementById("exportTxtBtn");
  const importTxtBtn=document.getElementById("importTxtBtn");
  const backupAllBtn=document.getElementById("backupAllBtn");
  const restoreAllBtn=document.getElementById("restoreAllBtn");
  const backupAllTxtBtn=document.getElementById("backupAllTxtBtn");
  const restoreAllTxtBtn=document.getElementById("restoreAllTxtBtn");

  const archiveDoneBtn=document.getElementById("archiveDoneBtn");
  const restoreFocusedBtn=document.getElementById("restoreFocusedBtn");
  const deleteFocusedBtn=document.getElementById("deleteFocusedBtn");
  const emptyArchiveBtn=document.getElementById("emptyArchiveBtn");

  const viewActiveBtn=document.getElementById("viewActiveBtn");
  const viewArchiveBtn=document.getElementById("viewArchiveBtn");
  const deletePageBtn=document.getElementById("deletePageBtn");

  const fileJson=document.getElementById("fileJson");
  const fileTxt=document.getElementById("fileTxt");
  const fileAll=document.getElementById("fileAll");
  const fileAllTxt=document.getElementById("fileAllTxt");
  const clipFallback=document.getElementById("clipFallback");
  
  const helpBtn=document.getElementById("helpBtn");
const helpModal=document.getElementById("helpModal");
const helpBackdrop=document.getElementById("helpBackdrop");
const helpClose=document.getElementById("helpClose");
const helpContent=document.getElementById("helpContent");

  /* =========================================================
     UI ONLY: Mobile drawers open/close (no app logic)
     ========================================================= */
  function closeDrawers(){
    body.classList.remove("right-open");
  }
function toggleLeftDrawer(){
    // Menu is now part of the right drawer
    toggleRightDrawer();
  }

  function toggleRightDrawer(){
    const open = body.classList.contains("right-open");
    body.classList.toggle("right-open", !open);
    body.classList.remove("left-open");
  }
  mobLeftBtn.addEventListener("click", (e)=>{ e.preventDefault(); toggleLeftDrawer(); });
  mobRightBtn.addEventListener("click", (e)=>{ e.preventDefault(); toggleRightDrawer(); });
  backdrop.addEventListener("click", ()=> closeDrawers());
  document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape") closeDrawers();
  });
  // Close drawers on resize to desktop
  window.addEventListener("resize", ()=>{
    if(window.matchMedia("(min-width: 769px)").matches) closeDrawers();
  });

/* =========================================================
     UI ONLY: Page size + right panel collapse (desktop)
     ========================================================= */
  let pageSize=(localStorage.getItem(SIZE_KEY) || "a5"); // default a5
  let rightCollapsed=(localStorage.getItem(RIGHT_COLLAPSE_KEY)==="1");

  function applyPageSize(){
    body.classList.toggle("size-a4", pageSize==="a4");
    body.classList.toggle("size-a5", pageSize!=="a4");
    // Button label shows what you'll switch TO
    if(pageSizeBtn) pageSizeBtn.textContent = (pageSize==="a4") ? "A5" : "A4";
  }

  function applyRightPanel(){
    body.classList.toggle("right-collapsed", rightCollapsed);
    if(toggleRightPanelBtn) toggleRightPanelBtn.textContent = rightCollapsed ? "Show Panel" : "Hide Panel";
  }

  if(pageSizeBtn){
    pageSizeBtn.addEventListener("click", () => {
      pageSize = (pageSize==="a4") ? "a5" : "a4";
      localStorage.setItem(SIZE_KEY, pageSize);
      applyPageSize();
    });
  }

  if(toggleRightPanelBtn){
    toggleRightPanelBtn.addEventListener("click", () => {
      rightCollapsed = !rightCollapsed;
      localStorage.setItem(RIGHT_COLLAPSE_KEY, rightCollapsed ? "1" : "0");
      applyRightPanel();
    });
  }

  // Apply saved UI state on load
  applyPageSize();
  applyRightPanel();

/* Help (README) modal - UI only */
let helpLoaded=false;

async function loadHelp(){
  if(helpLoaded) return;
  helpLoaded=true;

  const fallback =
`# Tiny Todo

Shortcuts:
- Ctrl+Alt+R  Add row
- Ctrl+Alt+T  Today
- Ctrl+Alt+4  A4/A5
- Ctrl+Alt+P  Panel
- Ctrl+Alt+Backspace/Delete  Delete focused line
`;

  try{
    const r=await fetch("README.md",{cache:"no-store"});
    if(!r.ok) throw new Error("no readme");
    const txt=await r.text();
    helpContent.textContent = txt.trim() ? txt : fallback;
  }catch(_){
    helpContent.textContent = fallback;
  }
}

function openHelp(){
  loadHelp();
  helpModal.classList.add("open");
  helpBackdrop.classList.add("open");
}
function closeHelp(){
  helpModal.classList.remove("open");
  helpBackdrop.classList.remove("open");
}

if(helpBtn) helpBtn.addEventListener("click",(e)=>{ e.preventDefault(); openHelp(); });
if(helpClose) helpClose.addEventListener("click",(e)=>{ e.preventDefault(); closeHelp(); });
if(helpBackdrop) helpBackdrop.addEventListener("click",closeHelp);

document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape") closeHelp();
});

/* =========================================================
     Shortcuts: Ctrl+Alt+4 (A4/A5), Ctrl+Alt+P (panel)
     UI ONLY
     ========================================================= */
  document.addEventListener("keydown",(e)=>{
  if(!(e.ctrlKey && e.altKey) || e.metaKey) return;

  const el=document.activeElement;
  const inTask = el && el.classList && el.classList.contains("task");
  if(inTask) return;

  const k = (e.key || "").toLowerCase();

  if(k === "4"){
    e.preventDefault();
    pageSize = (pageSize==="a4") ? "a5" : "a4";
    localStorage.setItem(SIZE_KEY, pageSize);
    applyPageSize();
    return;
  }

  if(k === "p"){
    e.preventDefault();
    rightCollapsed = !rightCollapsed;
    localStorage.setItem(RIGHT_COLLAPSE_KEY, rightCollapsed ? "1" : "0");
    applyRightPanel();
    return;
  }
});  // ✅ REQUIRED

// ✅ Separate listener
document.addEventListener("keydown",(e)=>{
  if(!(e.ctrlKey && e.altKey) || e.metaKey) return;

  const key = e.key;
  if(key !== "Backspace" && key !== "Delete") return;

  const el=document.activeElement;
  if(!(el && el.classList && el.classList.contains("task"))) return;

  e.preventDefault();
  deleteFocusedLine();
});

// Shortcut: Ctrl+Alt+R => Add Row (works across pages)
document.addEventListener("keydown",(e)=>{
  if(!(e.ctrlKey && e.altKey) || e.metaKey) return;
  const k=(e.key||"").toLowerCase();
  if(k!=="r") return;
  e.preventDefault();
  addRow(); // uses current page; switches to Active if needed
});

  /* =========================================================
     Existing app logic (unchanged)
     ========================================================= */

  let uiCompact=(localStorage.getItem(UI_KEY)==="1");
  function applyUiMode(){ body.classList.toggle("compact", uiCompact); }
  function toggleUiMode(){ uiCompact=!uiCompact; localStorage.setItem(UI_KEY, uiCompact?"1":"0"); applyUiMode(); }
  applyUiMode();

  let filterImportantOnly=(localStorage.getItem(FILTER_KEY)==="1");
  function applyImportantFilterUI(){ importantFilterBtn.classList.toggle("active", filterImportantOnly); }
  applyImportantFilterUI();

  let railQuery="";
  let notebook=loadNotebook()||seedNotebook();
  let view="active";
  let focusedId=null;

  function uid(){ return Math.random().toString(16).slice(2)+Date.now().toString(16); }
  function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

  let toastTimer;
  function toast(msg){
    statusEl.textContent=msg||"";
    if(!msg){ toastEl.style.display="none"; toastEl.textContent=""; return; }
    toastEl.textContent=msg; toastEl.style.display="block";
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{ toastEl.style.display="none"; toastEl.textContent=""; statusEl.textContent=""; },900);
  }

  // expanded state per page+view (memory only)
  const expandedMap=new Map();
  function expKey(){ return `${notebook.activePageId}|${view}`; }
  function expandedSet(){
    const k=expKey();
    if(!expandedMap.has(k)) expandedMap.set(k,new Set());
    return expandedMap.get(k);
  }
  function isExpanded(id){ return expandedSet().has(id); }
  function toggleExpanded(id){ const s=expandedSet(); if(s.has(id)) s.delete(id); else s.add(id); }
  const LONG_THRESHOLD=80;
  function isLongText(t){ return (String(t||"").trim().length>LONG_THRESHOLD); }

  // datetime shortcuts
  function pad2(n){ return String(n).padStart(2,"0"); }
  function fmtDateShort(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function fmtTimeOnly(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
  function fmtTimestamp(d){ return `${fmtDateShort(d)} ${fmtTimeOnly(d)}`; }
  function insertAtCursor(el,text){
    const s=el.selectionStart??el.value.length, e=el.selectionEnd??el.value.length;
    el.value=el.value.slice(0,s)+text+el.value.slice(e);
    const p=s+text.length; el.setSelectionRange(p,p);
    el.dispatchEvent(new Event("input",{bubbles:true}));
  }
  document.addEventListener("keydown",(e)=>{
    const el=document.activeElement;
    const inTask=el&&el.classList&&el.classList.contains("task");
    if(!inTask) return;
    if(!(e.ctrlKey&&e.altKey)||e.metaKey) return;
    const k=e.key.toLowerCase();
    if(k==="s"){e.preventDefault();insertAtCursor(el,fmtTimestamp(new Date()));}
    else if(k==="d"){e.preventDefault();insertAtCursor(el,fmtDateShort(new Date()));}
    else if(k==="h"){e.preventDefault();insertAtCursor(el,fmtTimeOnly(new Date()));}
  });

  // category + rename syntax
  function normalizeCategory(cat){ const c=String(cat||"").trim(); return c?c:UNCATEGORIZED; }
  function parseRenameInput(raw,currentCategory){
    const s=String(raw||"").trim(); if(!s) return null;
    const idx=s.indexOf("::");
    if(idx>=0){
      const catPart=s.slice(0,idx).trim();
      const namePart=s.slice(idx+2).trim();
      if(!namePart) return null;
      return {category:normalizeCategory(catPart),name:namePart};
    }
    return {category:normalizeCategory(currentCategory),name:s};
  }

  // full-text AND search
  function norm(s){ return String(s||"").toLowerCase(); }
  function tokenize(q){ const s=norm(q).trim(); return s? s.split(/\s+/).filter(Boolean):[]; }
  function pageHaystack(p){
    let h=(p.category||"")+" "+(p.name||"");
    if(Array.isArray(p.items)) for(const it of p.items) if(it&&it.text) h+=" "+it.text;
    return norm(h);
  }
  function pageMatchesTokens(p,tokens){
    if(!tokens.length) return true;
    const hay=pageHaystack(p);
    for(const t of tokens) if(!hay.includes(t)) return false;
    return true;
  }
  function itemMatchesTokens(text,tokens){
    if(!tokens.length) return true;
    const hay=norm(text||"");
    for(const t of tokens) if(!hay.includes(t)) return false;
    return true;
  }

  // data model
  function seedItems(){
    return [
      {id:uid(),text:"Task",done:false,important:false,indent:0,archived:false,archivedAt:null},
      {id:uid(),text:"Subtask (Tab to indent)",done:false,important:false,indent:1,archived:false,archivedAt:null}
    ];
  }
  function seedNotebook(){
    const pid=uid();
    return {
      version:1,
      activePageId:pid,
      pages:{ [pid]: {id:pid,name:"Personal",category:UNCATEGORIZED,items:seedItems(),sortUndo:null,hideChecks:false} }
    };
  }
  function normalizeItems(raw){
    if(!Array.isArray(raw)) return [];
    return raw.map(x=>({
      id:x.id||uid(),
      text:String(x.text||""),
      done:!!x.done,
      important:!!x.important,
      indent:clamp(Number(x.indent||0),0,MAX_INDENT),
      archived:!!x.archived,
      archivedAt:x.archivedAt||(x.archived?Date.now():null)
    }));
  }
  function ensureNotebookShape(nb){
    if(!nb||typeof nb!=="object"||!nb.pages||typeof nb.pages!=="object") return null;
    const ids=Object.keys(nb.pages); if(!ids.length) return null;
    for(const pid of ids){
      const p=nb.pages[pid]; if(!p||typeof p!=="object") return null;
      p.id=pid;
      p.name=String(p.name||"Untitled");
      p.category=normalizeCategory(p.category);
      p.items=normalizeItems(p.items);
      if(!("sortUndo" in p)) p.sortUndo=null;
	  if(!("hideChecks" in p)) p.hideChecks=false;
      if(p.items.filter(x=>!x.archived).length===0){
        p.items.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
      }
    }
    if(!nb.activePageId||!nb.pages[nb.activePageId]) nb.activePageId=ids[0];
    nb.version=1; return nb;
  }
  function loadNotebook(){
    try{
      const raw3=localStorage.getItem(KEY_V3);
      if(raw3) return ensureNotebookShape(JSON.parse(raw3));

      const raw2=localStorage.getItem(KEY_V2);
      if(raw2){
        const items=normalizeItems(JSON.parse(raw2));
        const pid=uid();
        const nb=ensureNotebookShape({
          version:1,
          activePageId:pid,
          pages:{ [pid]: {id:pid,name:"Personal",category:UNCATEGORIZED,items:items.length?items:seedItems(),sortUndo:null} }
        });
        localStorage.setItem(KEY_V3,JSON.stringify(nb));
        return nb;
      }

      const raw1=localStorage.getItem(KEY_V1);
      if(raw1){
        const parsed1=JSON.parse(raw1);
        if(Array.isArray(parsed1)){
          const migrated=parsed1.map(x=>({
            id:x.id||uid(),
            text:String(x.text||""),
            done:!!x.done,
            important:false,
            indent:clamp(Number(x.indent||0),0,MAX_INDENT),
            archived:false,
            archivedAt:null
          }));
          const pid=uid();
          const nb=ensureNotebookShape({
            version:1,
            activePageId:pid,
            pages:{ [pid]: {id:pid,name:"Personal",category:UNCATEGORIZED,items:migrated.length?migrated:seedItems(),sortUndo:null} }
          });
          localStorage.setItem(KEY_V3,JSON.stringify(nb));
          return nb;
        }
      }
      return null;
    }catch(e){ return null; }
  }

  function saveNotebook(){
    localStorage.setItem(KEY_V3,JSON.stringify(notebook));
    rebuildRail();
    updateSortLabel();
  }
  function currentPage(){ return notebook.pages[notebook.activePageId]; }
  // Per-page checkbox visibility (notepad mode)
function applyChecksUI(){
  const p=currentPage();
  const hide=!!p.hideChecks;

  body.classList.toggle("no-checks", hide);

  if(toggleChecksBtn){
    toggleChecksBtn.classList.toggle("active", hide);
    toggleChecksBtn.textContent = hide ? "✎" : "☑︎";
    toggleChecksBtn.title = hide
      ? "Show checkboxes (this page)"
      : "Hide checkboxes (this page)";
  }
}

if(toggleChecksBtn){
  toggleChecksBtn.addEventListener("click", ()=>{
    const p=currentPage();
    p.hideChecks = !p.hideChecks;
    saveNotebook();
    applyChecksUI();
    render(focusedId);
  });
}


  // page operations
  function switchPage(pageId){
    if(!notebook.pages[pageId]) return;
    notebook.activePageId=pageId; focusedId=null;
    saveNotebook(); render(null);
  }
  function newPage(){
    const name=prompt("Page name:","New Page"); if(!name) return;
    const id=uid();
    notebook.pages[id]={id,name:String(name).trim(),category:UNCATEGORIZED,
  items:[{id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null}],
  sortUndo:null,
  hideChecks:false
};
    notebook.activePageId=id; focusedId=notebook.pages[id].items[0].id;
    saveNotebook(); setView("active"); render(focusedId); toast("Page created");
  }
  function renamePageById(pageId){
    const p=notebook.pages[pageId]; if(!p) return;
    const prefill=`${normalizeCategory(p.category)}::${p.name}`;
    const raw=prompt("Rename (Category::Name or Name):",prefill);
    if(raw==null) return;
    const parsed=parseRenameInput(raw,p.category); if(!parsed) return;
    p.name=parsed.name; p.category=parsed.category;
    saveNotebook(); toast("Renamed");
  }
  function deletePage(){
    if(Object.keys(notebook.pages).length<=1) return;
    const p=currentPage();
    const ok=confirm(`Delete page "${p.name}"?\nThis permanently removes all tasks in it.`);
    if(!ok) return;
    delete notebook.pages[p.id];
    notebook.activePageId=Object.keys(notebook.pages)[0];
    focusedId=null;
    saveNotebook(); setView("active"); render(null); toast("Page deleted");
  }

  // Today
  function findTodayPageId(){
    for(const [pid,pg] of Object.entries(notebook.pages)){
      if(String(pg.name||"").trim().toLowerCase()==="today") return pid;
    }
    return null;
  }
  function ensureTodayPage(){
    let pid=findTodayPageId();
    if(pid && notebook.pages[pid]) return pid;
    pid=uid();
    notebook.pages[pid]={id:pid,name:"Today",category:UNCATEGORIZED,
  items:[{id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null}],
  sortUndo:null,
  hideChecks:false
};
    return pid;
  }
  function goToTodayPage(){ const todayId=ensureTodayPage(); switchPage(todayId); setView("active"); toast("Today"); }
  document.addEventListener("keydown",(e)=>{
    if(e.ctrlKey&&e.altKey&&!e.shiftKey&&!e.metaKey&&e.key.toLowerCase()==="t"){ e.preventDefault(); goToTodayPage(); }
  });

  // View + filter
  function setView(v){ view=v; render(focusedId); toast(v==="active"?"Active":"Archive"); }
  function visibleItems(){
    const items=currentPage().items.filter(it=> view==="active" ? !it.archived : it.archived);
    return filterImportantOnly ? items.filter(it=>!!it.important) : items;
  }
  function getItemById(id){ return currentPage().items.find(x=>x.id===id)||null; }
  
  // Delete currently focused row (works in both Active + Archive)
  function deleteFocusedLine(){
    if(!focusedId){ toast("No focus"); return; }
    const p=currentPage();
    const it=p.items.find(x=>x.id===focusedId) || null;
    if(!it){ toast("Not found"); return; }

    const hasText = String(it.text||"").trim().length>0;
    if(hasText){
      const ok = confirm("Delete this line?\n(This cannot be undone)");
      if(!ok) return;
    }

    // Remove it
    const removedId = it.id;
    p.items = p.items.filter(x=>x.id!==removedId);
    p.sortUndo = null;

    // Ensure Active view always has at least one line
    if(p.items.filter(x=>!x.archived).length===0){
      p.items.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
    }

    saveNotebook();

    // Choose next focus within current view list
    const list = visibleItems(); // respects current view + important filter
    focusedId = list[0]?.id || p.items[0]?.id || null;

    render(focusedId);
    toast("Deleted");
  }

  // Render
  function focusIndex(i){
    const el=grid.querySelector(`.row[data-index="${i}"] .task`);
    if(el) el.focus();
  }

  function render(tryFocusId){
    const p=currentPage();
	applyChecksUI();
    grid.innerHTML="";

    if(view==="active" && p.items.filter(x=>!x.archived).length===0){
      p.items.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
      p.sortUndo=null; saveNotebook();
    }

    const list=visibleItems();
    const isTodayPage=(p.name||"").trim().toLowerCase()==="today";

    list.forEach((it,idx)=>{
      const row=document.createElement("div");
      row.className="row"+(it.done?" done":"")+(it.archived?" archivedRow":"");
      row.dataset.id=it.id;
      row.dataset.index=String(idx);

      const cellCheck=document.createElement("div");
      cellCheck.className="cell check";
      const wrap=document.createElement("div");
      wrap.style.display="flex"; wrap.style.alignItems="center"; wrap.style.gap="4px";

      const cb=document.createElement("input");
      cb.type="checkbox"; cb.checked=!!it.done;
      cb.addEventListener("change",()=>{ it.done=cb.checked; saveNotebook(); render(it.id); });

      const imp=document.createElement("button");
      imp.type="button";
      imp.className="imp-btn"+(it.important?" active":"");
      imp.textContent="‼️";
      imp.title="Toggle important";
      imp.addEventListener("click",(ev)=>{
        ev.preventDefault(); ev.stopPropagation();
        it.important=!it.important;
        saveNotebook(); render(it.id);
      });

      wrap.appendChild(cb); wrap.appendChild(imp);
      cellCheck.appendChild(wrap);

      const cellText=document.createElement("div");
      cellText.className="cell text";
      cellText.style.setProperty("--indentLevel",clamp(it.indent,0,MAX_INDENT));

      const input=document.createElement("input");
      input.className="task";
      input.value=it.text||"";
      input.placeholder=(view==="active" && idx===0 && !it.text) ? "Type a task..." : "";
      input.spellcheck=false;
      input.autocomplete="off";
      input.addEventListener("focus",()=> focusedId=it.id);
      input.addEventListener("input",()=>{ it.text=input.value; saveNotebook(); });
      input.addEventListener("keydown",(e)=> onKey(e,it.id));
      cellText.appendChild(input);

      if(isLongText(it.text)){
        const exp=isExpanded(it.id);
        const chev=document.createElement("button");
        chev.type="button";
        chev.className="exp-btn"+(exp?" active":"");
        chev.textContent=exp ? "▾" : "▸";
        chev.title=exp ? "Collapse" : "Expand";
        chev.addEventListener("click",(ev)=>{

  function onKey(e,id){
    const p=currentPage();
    const it=getItemById(id);
    if(!it) return;

    const list=visibleItems();
    const idx=list.findIndex(x=>x.id===id);
    const input=e.target;
    const canAddRows=(view==="active");

    if((e.ctrlKey||e.metaKey) && e.key==="Enter"){
      e.preventDefault();
      it.done=!it.done;
      saveNotebook();
      render(it.id);
      return;
    }

    if(e.key==="Enter"){
      if(!canAddRows) return;
      e.preventDefault();
      const newItem={id:uid(),text:"",done:false,important:false,indent:it.indent,archived:false,archivedAt:null};
      const gi=p.items.findIndex(x=>x.id===it.id);
      p.items.splice(gi+1,0,newItem);
      p.sortUndo=null;
      saveNotebook();
      render(newItem.id);
      return;
    }

    if(e.key==="Tab"){
      e.preventDefault();
      it.indent=e.shiftKey?clamp(it.indent-1,0,MAX_INDENT):clamp(it.indent+1,0,MAX_INDENT);
      p.sortUndo=null; saveNotebook(); render(it.id); return;
    }

    if(e.key==="Backspace"){
      if(input.value==="" && list.length>1){
        e.preventDefault();
        const gi=p.items.findIndex(x=>x.id===it.id);
        p.items.splice(gi,1);
        p.sortUndo=null;
        saveNotebook();
        const prevIdx=Math.max(0,idx-1);
        const after=visibleItems()[prevIdx];
        render(after?after.id:null);
        return;
      }
    }

    if(e.key==="ArrowUp"){
      const atStart=input.selectionStart===0 && input.selectionEnd===0;
      if(atStart || input.value.length===0){
        e.preventDefault();
        focusIndex(Math.max(0,idx-1));
      }
    }
    if(e.key==="ArrowDown"){
      const atEnd=input.selectionStart===input.value.length && input.selectionEnd===input.value.length;
      if(atEnd || input.value.length===0){
        e.preventDefault();
        focusIndex(Math.min(list.length-1,idx+1));
      }
    }
  }

  // Sort/Unsort
  function normTitle2(s){ return String(s||"").trim().toLocaleLowerCase(); }
  function blockify(list){
    const blocks=[]; let current=null;
    for(const it of list){
      const isTop=(Number(it.indent)===0);
      if(isTop||!current){ current={key:normTitle2(it.text),items:[it]}; blocks.push(current); }
      else current.items.push(it);
    }
    for(const b of blocks) if(!b.key) b.key="";
    return blocks;
  }
  function updateSortLabel(){
    const p=currentPage();
    sortBtn.textContent=(p.sortUndo && Array.isArray(p.sortUndo.ids) && p.sortUndo.ids.length) ? "Unsort" : "Sort A→Z";
  }
  function sortOrUnsort(){
    const p=currentPage();
    if(p.sortUndo && Array.isArray(p.sortUndo.ids) && p.sortUndo.ids.length){
      const snapshot=p.sortUndo.ids.slice();
      const byId=new Map(p.items.map(x=>[x.id,x]));
      const restored=[];
      for(const id of snapshot){ const it=byId.get(id); if(it) restored.push(it); }
      const restoredIds=new Set(restored.map(x=>x.id));
      for(const it of p.items) if(!restoredIds.has(it.id)) restored.push(it);
      p.items=restored;
      p.sortUndo=null;
      saveNotebook();
      render(focusedId);
      toast("Unsorted");
      return;
    }
    p.sortUndo={ids:p.items.map(x=>x.id),savedAt:Date.now()};
    const active=p.items.filter(x=>!x.archived);
    const archived=p.items.filter(x=>x.archived);
    const target=(view==="active")?active:archived;
    const blocks=blockify(target);
    blocks.sort((a,b)=>a.key.localeCompare(b.key));
    const sortedTarget=blocks.flatMap(b=>b.items);
    p.items=(view==="active")?[...sortedTarget,...archived]:[...active,...sortedTarget];
    saveNotebook();
    render(focusedId);
    toast("Sorted");
  }

  // Move block to Today
  function getVisibleBlock(list,startId){
    const startIdx=list.findIndex(x=>x.id===startId);
    if(startIdx<0) return {ids:[],nextFocusId:null};
    const startIndent=Number(list[startIdx].indent||0);
    const block=[list[startIdx]];
    for(let i=startIdx+1;i<list.length;i++){
      const ind=Number(list[i].indent||0);
      if(ind>startIndent) block.push(list[i]); else break;
    }
    const after=list[startIdx+block.length];
    const before=list[startIdx-1];
    return {ids:block.map(x=>x.id),nextFocusId:after?after.id:(before?before.id:null)};
  }
  function insertIntoActiveSection(itemsArr,newItems){
    let idx=itemsArr.findIndex(x=>x.archived);
    if(idx<0) idx=itemsArr.length;
    itemsArr.splice(idx,0,...newItems);
  }
  function moveBlockToToday(startId){
    const source=currentPage();
    if(String(source.name||"").trim().toLowerCase()==="today"){ toast("Already Today"); return; }
    if(view!=="active"){ toast("Active only"); return; }

    const {ids,nextFocusId}=getVisibleBlock(visibleItems(),startId);
    if(!ids.length) return;

    const todayId=ensureTodayPage();
    const today=notebook.pages[todayId];

    source.sortUndo=null; today.sortUndo=null;

    const setIds=new Set(ids);
    const moving=[];
    source.items=source.items.filter(it=>{
      if(setIds.has(it.id)){ moving.push(it); return false; }
      return true;
    });

    insertIntoActiveSection(today.items,moving);

    if(source.items.filter(x=>!x.archived).length===0){
      source.items.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
    }

    saveNotebook();
    focusedId=nextFocusId || source.items.find(x=>!x.archived)?.id || source.items[0]?.id || null;
    render(focusedId);
    toast(`Moved ${moving.length}`);
  }

  // Clipboard copy/paste
  async function writeClipboard(text){
    try{ await navigator.clipboard.writeText(text); return true; }
    catch(e){
      try{
        clipFallback.value=text;
        clipFallback.focus();
        clipFallback.select();
        return document.execCommand("copy");
      }catch(_){ return false; }
    }
  }
  async function readClipboard(){
    try{ return await navigator.clipboard.readText(); }
    catch(e){ return prompt("Paste tasks text here:")||""; }
  }

  function formatTxtLine(it){
    const tabs="\t".repeat(clamp(it.indent,0,MAX_INDENT));
    const mark=it.done?"[x] ":"[ ] ";
    return tabs+mark+(it.text||"");
  }
  function getActiveList(){ return currentPage().items.filter(it=>!it.archived); }
  function getBlockFromActive(startId){
    const list=getActiveList();
    const startIdx=list.findIndex(x=>x.id===startId);
    if(startIdx<0) return [];
    const startIndent=Number(list[startIdx].indent||0);
    const block=[list[startIdx]];
    for(let i=startIdx+1;i<list.length;i++){
      const ind=Number(list[i].indent||0);
      if(ind>startIndent) block.push(list[i]); else break;
    }
    return block;
  }
  function blockToText(block){ return block.map(formatTxtLine).join("\n")+"\n"; }
  function textToItems(text){
    const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    const out=[];
    for(let line of lines){
      if(!line||line.trim()==="") continue;

      let indent=0;
      while(line.startsWith("\t")){ indent++; line=line.slice(1); }
      while(line.startsWith("  ")){ indent++; line=line.slice(2); }
      indent=clamp(indent,0,MAX_INDENT);

      const trimmed=line.trimStart();
      let done=false, textPart=trimmed;

      const m=trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
      if(m){ done=(m[1].toLowerCase()==="x"); textPart=m[2]??""; }

      out.push({id:uid(),text:String(textPart),done,important:false,indent,archived:false,archivedAt:null});
    }
    return out;
  }
  function insertItemsBelowId(anchorId,newItems){
    if(!newItems.length) return;
    const p=currentPage();

    let insertIndex=p.items.findIndex(x=>x.archived);
    if(insertIndex<0) insertIndex=p.items.length;

    const gi=p.items.findIndex(x=>x.id===anchorId);
    if(gi>=0 && !p.items[gi].archived){
      const startIndent=Number(p.items[gi].indent||0);
      let end=gi+1;
      while(end<p.items.length){
        const next=p.items[end];
        if(next.archived) break;
        const ind=Number(next.indent||0);
        if(ind>startIndent) end++; else break;
      }
      insertIndex=end;
    }

    p.items.splice(insertIndex,0,...newItems);
    p.sortUndo=null;
    saveNotebook();
    focusedId=newItems[0].id;
    render(focusedId);
  }
  async function doCopyById(rowId){
    if(view!=="active"){ toast("Active only"); return; }
    const block=getBlockFromActive(rowId);
    if(!block.length){ toast("Nothing"); return; }
    const ok=await writeClipboard(blockToText(block));
    toast(ok?"Copied":"Copy failed");
  }
  async function doPasteBelowId(rowId){
    if(view!=="active"){ toast("Active only"); return; }
    const text=await readClipboard();
    const items=textToItems(text);
    if(!items.length){ toast("Nothing"); return; }
    insertItemsBelowId(rowId,items);
    toast("Pasted");
  }

  // Ctrl/Cmd+Shift+C/V
  document.addEventListener("keydown",(e)=>{
    const isMac=navigator.platform.toUpperCase().includes("MAC");
    const mod=isMac?e.metaKey:e.ctrlKey;
    const el=document.activeElement;
    const inTask=el&&el.classList&&el.classList.contains("task");
    if(!mod||!e.shiftKey||!inTask) return;
    if(e.key.toLowerCase()==="c"){
      if(el.selectionStart!==el.selectionEnd) return;
      e.preventDefault();
      if(focusedId) doCopyById(focusedId);

    if(e.key.toLowerCase()==="v"){

  // Export/Import/Backup/Restore
  function downloadBlob(blob,filename){
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function safeName(name){
    return String(name||"page").trim().replace(/[^\w\-]+/g,"_").slice(0,40) || "page";
  }

  function toPlainTextForPage(page){
    const lines=[];
    const items=page.items||[];
    const active=items.filter(x=>!x.archived);
    const archived=items.filter(x=>x.archived);

    for(const it of active) lines.push(formatTxtLine(it));
    if(archived.length){
      lines.push(ARCHIVE_MARKER);
      for(const it of archived) lines.push(formatTxtLine(it));
    }
    return lines.join("\n") + "\n";
  }

  function fromPlainTextToItems(text){
    const rawLines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    let inArchive=false;
    const out=[];
    for(let line of rawLines){
      if(!line || line.trim()==="") continue;
      if(line.trim()===ARCHIVE_MARKER){ inArchive=true; continue; }

      let indent=0;
      while(line.startsWith("\t")){ indent++; line=line.slice(1); }
      while(line.startsWith("  ")){ indent++; line=line.slice(2); }
      indent=clamp(indent,0,MAX_INDENT);

      const trimmed=line.trimStart();
      let done=false, textPart=trimmed;
      const m=trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
      if(m){ done=(m[1].toLowerCase()==="x"); textPart=m[2]??""; }

      out.push({id:uid(),text:String(textPart),done,important:false,indent,archived:inArchive,archivedAt:inArchive?Date.now():null});
    }
    if(out.filter(x=>!x.archived).length===0){
      out.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
    }
    return out;
  }

  // Backup/restore ALL TXT (v2.2)
  const TXT_ALL_MAGIC = "# tiny-todo-backup-txt v1";
  const PAGE_HEADER_PREFIX = "=== PAGE:";

  function formatTxtLineAll(it){
    const tabs="\t".repeat(clamp(it.indent,0,MAX_INDENT));
    const mark=it.done?"[x] ":"[ ] ";
    const imp = it.important ? "‼️ " : "";
    return tabs + mark + imp + (it.text || "");
  }
  function toPlainTextForPageAll(page){
    const lines=[];
    const items=page.items||[];
    const active=items.filter(x=>!x.archived);
    const archived=items.filter(x=>x.archived);

    for(const it of active) lines.push(formatTxtLineAll(it));
    if(archived.length){
      lines.push(ARCHIVE_MARKER);
      for(const it of archived) lines.push(formatTxtLineAll(it));
    }
    return lines.join("\n") + "\n";
  }
  function backupAllTxt(){
    const nowIso=new Date().toISOString();
    const lines=[];
    lines.push(TXT_ALL_MAGIC);
    lines.push(`# exportedAt: ${nowIso}`);
    lines.push("");

    const pages=Object.values(notebook.pages).slice().sort((a,b)=>{
      const ac=normalizeCategory(a.category).localeCompare(normalizeCategory(b.category));
      if(ac!==0) return ac;
      return String(a.name||"").localeCompare(String(b.name||""));
    });

    for(const p of pages){
      const cat=normalizeCategory(p.category);
      const name=String(p.name||"Untitled").trim() || "Untitled";
      lines.push(`=== PAGE: ${cat} :: ${name} ===`);
      lines.push(toPlainTextForPageAll(p).trimEnd());
      lines.push("");
    }

    const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
    downloadBlob(blob,`tiny-todo-backup-${new Date().toISOString().slice(0,10)}.txt`);
    toast("Backup ALL (TXT) exported");
  }
  function parsePageHeader(line){
    let s=line.trim();
    s=s.replace(/^===\s*PAGE:\s*/i,"").replace(/\s*===$/,"").trim();
    let cat=UNCATEGORIZED, name=s;
    const sep = s.includes(" :: ") ? " :: " : (s.includes("::") ? "::" : null);
    if(sep){
      const idx=s.indexOf(sep);
      const left=s.slice(0,idx).trim();
      const right=s.slice(idx+sep.length).trim();
      cat=normalizeCategory(left);
      name=right || "Untitled";
    }else{
      cat=UNCATEGORIZED;
      name=s || "Untitled";
    }
    return {category:cat,name};
  }
  function parseItemsFromAllTxt(pageText){
    const rawLines=pageText.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    let inArchive=false;
    const out=[];
    for(let line of rawLines){
      if(!line || line.trim()==="") continue;
      if(line.trim()===ARCHIVE_MARKER){ inArchive=true; continue; }

      let indent=0;
      while(line.startsWith("\t")){ indent++; line=line.slice(1); }
      while(line.startsWith("  ")){ indent++; line=line.slice(2); }
      indent=clamp(indent,0,MAX_INDENT);

      const trimmed=line.trimStart();
      let done=false;
      let textPart=trimmed;
      const m=trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
      if(m){ done=(m[1].toLowerCase()==="x"); textPart=m[2]??""; }

      let important=false;
      let finalText=String(textPart||"");
      if(finalText.startsWith("‼️")){
        important=true;
        finalText=finalText.replace(/^‼️\s*/,"");
      }

      out.push({id:uid(),text:finalText,done,important,indent,archived:inArchive,archivedAt:inArchive?Date.now():null});
    }
    if(out.filter(x=>!x.archived).length===0){
      out.unshift({id:uid(),text:"",done:false,important:false,indent:0,archived:false,archivedAt:null});
    }
    return out;
  }
  async function restoreAllTxtFromFile(f){
    const text=await f.text();
    const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    const hasMagic = lines.some(l=>l.trim()===TXT_ALL_MAGIC);
    if(!hasMagic){
      const ok = confirm("This file doesn't look like a Tiny Todo TXT backup.\nTry to restore anyway?");
      if(!ok) return;
    }

    const pages = {};
    let currentHeader=null;
    let buffer=[];

    function flush(){
      if(!currentHeader) return;
      const {category,name} = currentHeader;
      const pid = uid();
      const items = parseItemsFromAllTxt(buffer.join("\n"));
      pages[pid] = { id: pid, name, category, items, sortUndo: null };
      buffer=[];
      currentHeader=null;
    }

    for(const line of lines){
      const t=line.trim();
      if(t.startsWith("#")) continue;
      if(t.toUpperCase().startsWith(PAGE_HEADER_PREFIX)){
        flush();
        currentHeader = parsePageHeader(t);
        continue;
      }
      if(currentHeader) buffer.push(line);
    }
    flush();

    if(Object.keys(pages).length===0) throw new Error("No pages found in TXT backup.");

    const ok = confirm("Restore ALL (TXT) will replace your current pages and tasks. Continue?");
    if(!ok) return;

    const firstId = Object.keys(pages)[0];
    notebook = ensureNotebookShape({version:1,activePageId:firstId,pages});
    view="active";
    focusedId=null;
    saveNotebook();
    rebuildRail();
    setView("active");
    render(null);
    toast("Restored ALL (TXT)");
  }

  // Rail collapse persistence
  function catStorageKey(cat){ return RAIL_KEY_PREFIX+encodeURIComponent(cat); }
  function isCatClosed(cat){ return localStorage.getItem(catStorageKey(cat))==="1"; }
  function setCatClosed(cat,closed){
    const k=catStorageKey(cat);
    if(closed) localStorage.setItem(k,"1"); else localStorage.removeItem(k);
  }

  function rebuildRail(){
    const tokens=tokenize(railQuery);
    const searching=tokens.length>0;
    railTitle.textContent=searching?"Results":"Pages";
    pagesRail.innerHTML="";

    const pagesAll=Object.values(notebook.pages).slice().sort((a,b)=>a.name.localeCompare(b.name));
    const matchedPages=pagesAll.filter(p=>pageMatchesTokens(p,tokens));

    if(searching){
      const catMap=new Map();
      for(const p of matchedPages){
        const hits=[];
        for(const it of (p.items||[])){
          const txt=(it&&it.text)?String(it.text):"";
          if(!txt.trim()) continue;
          if(itemMatchesTokens(txt,tokens)){
            hits.push({itemId:it.id,text:txt,archived:!!it.archived,indent:Number(it.indent||0)});
          }
        }
        if(hits.length===0) hits.push({itemId:null,text:"[match in page name/category]",archived:false,indent:0});
        const cat=normalizeCategory(p.category);
        if(!catMap.has(cat)) catMap.set(cat,[]);
        catMap.get(cat).push({page:p,hits});
      }

      if(catMap.size===0){
        const div=document.createElement("div");
        div.className="rail-empty";
        div.textContent="No matches";
        pagesRail.appendChild(div);
        return;
      }

      const cats=Array.from(catMap.keys()).sort((a,b)=>{
        if(a===UNCATEGORIZED && b!==UNCATEGORIZED) return 1;
        if(b===UNCATEGORIZED && a!==UNCATEGORIZED) return -1;
        return a.localeCompare(b);
      });

      for(const cat of cats){
        const wrap=document.createElement("div");
        wrap.className="results-cat";
        const h=document.createElement("div");
        h.className="results-cat-title";
        h.textContent=cat;
        wrap.appendChild(h);

        const entries=catMap.get(cat).slice().sort((a,b)=>a.page.name.localeCompare(b.page.name));
        for(const entry of entries){
          const sec=document.createElement("div");
          sec.className="results-page";

          const titleRow=document.createElement("div");
          titleRow.className="results-page-title";

          const nameBtn=document.createElement("button");
          nameBtn.type="button";
          nameBtn.className="name";
          nameBtn.textContent=entry.page.name;
          nameBtn.addEventListener("click",()=>switchPage(entry.page.id));

          const jump=document.createElement("button");
          jump.type="button";
          jump.className="jump";
          jump.textContent="→";
          jump.addEventListener("click",()=>switchPage(entry.page.id));

          titleRow.appendChild(nameBtn);
          titleRow.appendChild(jump);
          sec.appendChild(titleRow);

          for(const hit of entry.hits){
            const b=document.createElement("button");
            b.type="button";
            b.className="result-item";

            const meta=document.createElement("span");
            meta.className="result-meta";
            const ind=Math.max(0,Math.min(9,hit.indent|0));
            const arch=hit.archived?"A":"•";
            meta.textContent=`${arch}${ind>0?("·"+ind):""}`;
            b.appendChild(meta);

            const txt=document.createElement("span");
            txt.textContent=hit.text;
            b.appendChild(txt);

            b.addEventListener("click",()=>{
              if(hit.itemId) goToItem(entry.page.id,hit.itemId,hit.archived);
              else switchPage(entry.page.id);
            });

            sec.appendChild(b);
          }

          wrap.appendChild(sec);
        }
        pagesRail.appendChild(wrap);
      }
      return;
    }

    const groups=new Map();
    for(const p of pagesAll){
      const cat=normalizeCategory(p.category);
      if(!groups.has(cat)) groups.set(cat,[]);
      groups.get(cat).push(p);
    }

    const cats=Array.from(groups.keys()).sort((a,b)=>{
      if(a===UNCATEGORIZED && b!==UNCATEGORIZED) return 1;
      if(b===UNCATEGORIZED && a!==UNCATEGORIZED) return -1;
      return a.localeCompare(b);
    });

    for(const cat of cats){
      const details=document.createElement("details");
      details.className="rail-cat";
      if(!isCatClosed(cat)) details.open=true;

      const summary=document.createElement("summary");
      summary.textContent=cat;

      const list=document.createElement("div");
      list.className="rail-pages";

      const pages=groups.get(cat).slice().sort((a,b)=>a.name.localeCompare(b.name));
      for(const p of pages){
        const row=document.createElement("div");
        row.className="page-row";

        const link=document.createElement("button");
        link.type="button";
        link.className="page-link"+(p.id===notebook.activePageId?" active":"");
        link.textContent=p.name;
        link.addEventListener("click",()=>switchPage(p.id));

        const ren=document.createElement("button");
        ren.type="button";
        ren.className="page-rename";
        ren.textContent="✎";
        ren.title="Rename (Category::Name)";
        ren.addEventListener("click",(ev)=>{
          ev.preventDefault(); ev.stopPropagation();
          renamePageById(p.id);
        });

        row.appendChild(link);
        row.appendChild(ren);
        list.appendChild(row);
      }

      details.appendChild(summary);
      details.appendChild(list);
      details.addEventListener("toggle",()=>setCatClosed(cat,!details.open));
      pagesRail.appendChild(details);
    }
  }

  function computeSearchResults(tokens){
    const pagesMatched=Object.values(notebook.pages).filter(p=>pageMatchesTokens(p,tokens));
    const taskHits=[];
    for(const p of pagesMatched){
      for(const it of (p.items||[])){
        const txt=it&&it.text?String(it.text):"";
        if(!txt.trim()) continue;
        if(itemMatchesTokens(txt,tokens)){
          taskHits.push({pageId:p.id,itemId:it.id,archived:!!it.archived});
        }
      }
    }
    return {pagesMatched,taskHits};
  }

  function goToItem(pageId,itemId,archived){
    if(!notebook.pages[pageId]) return;
    notebook.activePageId=pageId;
    focusedId=itemId;
    view=archived?"archive":"active";
    saveNotebook();
    render(itemId);
  }

  // UI actions
  importantFilterBtn.addEventListener("click",()=>{
    filterImportantOnly=!filterImportantOnly;
    localStorage.setItem(FILTER_KEY,filterImportantOnly?"1":"0");
    applyImportantFilterUI();
    render(focusedId);
  });

  pageSearch.addEventListener("input",()=>{ railQuery=pageSearch.value||""; rebuildRail(); });
  pageSearch.addEventListener("keydown",(e)=>{
    if(e.key==="Escape"){
      e.preventDefault(); pageSearch.value=""; railQuery=""; rebuildRail(); pageSearch.blur();
    }
    if(e.key==="Enter"){
      const tokens=tokenize(pageSearch.value||"");
      if(!tokens.length) return;
      const {pagesMatched,taskHits}=computeSearchResults(tokens);
      if(taskHits.length===1){
        e.preventDefault();
        goToItem(taskHits[0].pageId,taskHits[0].itemId,taskHits[0].archived);
      }else if(pagesMatched.length===1){
        e.preventDefault();
        switchPage(pagesMatched[0].id);
      }
    }
  });

  function wireFileInput(btn,input,handler){
    btn.addEventListener("click",()=>input.click());
    input.addEventListener("change",async ()=>{
      const f=input.files[0]; if(!f) return;
      try{ await handler(f); }
      catch(e){ alert(e.message||String(e)); }
      finally{ input.value=""; }
    });
  }

  // wire
  toggleUi.addEventListener("click",toggleUiMode);
  newPageBtn.addEventListener("click",newPage);
  todayBtn.addEventListener("click",goToTodayPage);

  addRowBtn.addEventListener("click",addRow);
  sortBtn.addEventListener("click",sortOrUnsort);

  exportJsonBtn.addEventListener("click",exportJson);
  wireFileInput(importJsonBtn,fileJson,importJsonFile);

  exportTxtBtn.addEventListener("click",exportTxt);
  wireFileInput(importTxtBtn,fileTxt,importTxtFile);

  backupAllBtn.addEventListener("click",backupAll);
  wireFileInput(restoreAllBtn,fileAll,restoreAllFromFile);

  backupAllTxtBtn.addEventListener("click",backupAllTxt);
  wireFileInput(restoreAllTxtBtn,fileAllTxt,restoreAllTxtFromFile);

  archiveDoneBtn.addEventListener("click",archiveDone);
  restoreFocusedBtn.addEventListener("click",restoreFocused);
  deleteFocusedBtn.addEventListener("click",deleteFocused);
  emptyArchiveBtn.addEventListener("click",emptyArchive);

  viewActiveBtn.addEventListener("click",()=>setView("active"));
  viewArchiveBtn.addEventListener("click",()=>setView("archive"));
  deletePageBtn.addEventListener("click",deletePage);

  // init
  rebuildRail();
  focusedId=currentPage().items.find(x=>!x.archived)?.id || currentPage().items[0]?.id || null;
  applyChecksUI();
  setView("active");
  updateSortLabel();
  toast("");
})();
</script>
</body>
</html>
