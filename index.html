<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tiny Todo</title>

  <style>
    :root{
      --paper: #fcfbf7;
      --paper-edge: #efece3;
      --paper-line: rgba(40, 60, 90, 0.08);

      --text:#121212;
      --muted:#6a6a6a;

      --row-h: 22px;
      --font: 13px;
      --pad-x: 4px;

      --check-col: 28px;
      --move-col: 36px;           /* Today arrow column */
      --indent-step: 16px;
      --max-indent: 6;

      --a6w: 105mm;
    }

    *{ box-sizing:border-box; }
    html, body{ height: 100%; }
    html{ -webkit-text-size-adjust: 100%; }

    body{
      margin:0;
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,0,0,0.05), transparent 55%),
        #f4f4f4;
    }

    header{
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(244,244,244,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 6px 0;
    }
    .header-inner{
      width: 100%;
      max-width: var(--a6w);
      margin: 0 auto;
      padding: 0 8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title{
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.2px;
      white-space: nowrap;
      cursor: pointer;          /* NEW: clickable toggle */
      user-select: none;
    }

    .header-right{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:8px;
      min-width: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .page-select{
      max-width: 140px;
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
      padding: 4px 10px;
      font: inherit;
      color: var(--text);
      outline: none;
      height: 26px;
      line-height: 1;
    }

    .pill-btn{
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
      padding: 4px 10px;
      height: 26px;
      font: inherit;
      cursor:pointer;
      line-height: 1;
      white-space: nowrap;
    }
    .pill-btn:active{ transform: translateY(1px); }
    .pill-btn:disabled{ opacity:0.45; cursor: default; }

    .tabs{ display:flex; gap:6px; align-items:center; }
    .tab{
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 999px;
      font: inherit;
      cursor:pointer;
      line-height: 1;
      color: var(--text);
      height: 26px;
    }
    .tab.active{
      border-color: rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.95);
      font-weight: 600;
    }

    .wrap{
      width: 100%;
      max-width: var(--a6w);
      margin: 0 auto;
      padding: 10px 8px 18px;
    }

    .paper{
      border: 1px solid var(--paper-edge);
      border-radius: 14px;
      overflow: hidden;
      background: var(--paper);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.08),
        0 2px 6px rgba(0,0,0,0.06);
    }

    .grid{
      position: relative;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0.0) 24px),
        linear-gradient(to right,
          transparent 0,
          transparent calc(var(--check-col) - 1px),
          rgba(40,60,90,0.10) calc(var(--check-col) - 1px),
          transparent var(--check-col)
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--paper-line) calc(var(--row-h) - 1px),
          var(--paper-line) var(--row-h)
        );
    }

    .row{
      display:grid;
      grid-template-columns: var(--check-col) 1fr var(--move-col);
      align-items:center;
      min-height: var(--row-h);
    }

    .cell{
      padding: 0 var(--pad-x);
      height: var(--row-h);
      display:flex;
      align-items:center;
      min-width: 0;
      background: transparent;
    }
    .cell.check{
      justify-content:center;
      border-right: 1px solid rgba(40,60,90,0.08);
    }
    .cell.move{
      justify-content:center;
      border-left: 1px solid rgba(40,60,90,0.06);
    }

    input[type="checkbox"]{
      width: 14px;
      height: 14px;
      margin:0;
      accent-color:#222;
    }

    .task{
      width:100%;
      height: calc(var(--row-h) - 2px);
      border:none;
      outline:none;
      font: inherit;
      padding:0;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .done .task{ text-decoration: line-through; color:#777; }
    .archived .task{ color:#666; }

    .cell.text{
      padding-left: calc(var(--pad-x) + (var(--indent) * var(--indent-step)));
    }

    .today-btn{
      border:1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
      font: inherit;
      padding: 0 8px;
      height: 22px;
      line-height: 1;
      cursor: pointer;
      color: #222;
    }
    .today-btn:active{ transform: translateY(1px); }
    .today-btn:disabled{ opacity: 0.35; cursor: default; }

    .bar{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap: wrap;
      align-items:center;
    }

    button.action{
      border:1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      padding: 6px 9px;
      border-radius: 12px;
      font: inherit;
      cursor:pointer;
      line-height: 1.1;
      white-space: nowrap;
    }
    button.action:active{ transform: translateY(1px); }
    button.action.ghost{ background: rgba(255,255,255,0.55); }
    button.action.danger{ border-color: rgba(190, 80, 80, 0.35); }
    button.action:disabled{ opacity:0.45; cursor: default; }

    .small{
      font-size:12px;
      color: var(--muted);
      margin-left:auto;
    }

    .file{ display:none; }

    /* Clipboard fallback textarea */
    #clipFallback{
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* -----------------------------
       NEW: Compact UI mode
       Only keep: pageSelect + newPage + renamePage
       ----------------------------- */
    body.compact-ui .tabs{ display:none !important; }
    body.compact-ui #deletePage{ display:none !important; } /* hide Del */
    body.compact-ui .bar{ display:none !important; }        /* hide bottom actions */

    /* hide row move column (→) and remove that column from grid */
    body.compact-ui .cell.move{ display:none !important; }
    body.compact-ui .row{ grid-template-columns: var(--check-col) 1fr; }

    @media (max-width: 520px){
      :root{
        --row-h: 28px;
        --font: 15px;
        --pad-x: 6px;
        --check-col: 34px;
        --move-col: 44px;
        --indent-step: 18px;
      }
      .task{ font-size: 16px; } /* prevent iOS zoom */
      input[type="checkbox"]{ width: 16px; height: 16px; }
      button.action{ padding: 9px 12px; }
      header{ padding: 8px 0; }
      .header-inner, .wrap{ max-width: 100%; }
      .page-select{ max-width: 120px; }
      .today-btn{ height: 26px; padding: 0 10px; }
    }

    @media print{
      body{ background: #fff; }
      @page { size: A6; margin: 6mm; }
      header{ position: static; background:#fff; border-bottom:1px solid #ddd; }
      .paper{ box-shadow:none; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <!-- NEW: click title to toggle compact/full controls -->
      <div class="title" id="uiToggleTitle" title="Tap to show/hide controls">Tiny Todo</div>

      <div class="header-right">
        <select class="page-select" id="pageSelect" title="Pages"></select>
        <button class="pill-btn" id="newPage" title="New page">+ Page</button>
        <button class="pill-btn" id="renamePage" title="Rename page">Rename</button>
        <button class="pill-btn" id="deletePage" title="Delete page">Del</button>

        <div class="tabs">
          <button class="tab" id="tabActive">Active</button>
          <button class="tab" id="tabArchive">Archive (<span id="archCount">0</span>)</button>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="paper">
      <div class="grid" id="grid" aria-label="todo grid"></div>
    </div>

    <div class="bar">
      <button class="action" id="add">+ Row</button>

      <button class="action ghost" id="archiveDone">Archive done</button>

      <button class="action ghost" id="restoreFocused">Restore focused</button>
      <button class="action danger" id="deleteFocused">Delete focused</button>
      <button class="action danger" id="emptyArchive">Empty archive</button>

      <button class="action" id="copyTasks">Copy</button>
      <button class="action" id="pasteTasks">Paste</button>

      <button class="action" id="exportJson">Export JSON</button>
      <button class="action" id="importJson">Import JSON</button>
      <button class="action" id="exportTxt">Export TXT</button>
      <button class="action" id="importTxt">Import TXT</button>

      <button class="action" id="backupAll">Backup ALL</button>
      <button class="action danger" id="restoreAll">Restore ALL</button>

      <button class="action" id="sortTitle">Sort A→Z</button>

      <input class="file" id="fileJson" type="file" accept="application/json" />
      <input class="file" id="fileTxt" type="file" accept="text/plain,.txt" />
      <input class="file" id="fileAll" type="file" accept="application/json" />

      <textarea id="clipFallback" aria-hidden="true"></textarea>

      <div class="small" id="status"></div>
    </div>
  </div>

  <script>
    // -----------------------------
    // Storage keys
    // -----------------------------
    const KEY_V3 = "tiny_todo_v3_pages";
    const KEY_V2 = "tiny_todo_v2";
    const KEY_V1 = "tiny_todo_v1";
    const UI_KEY = "tiny_todo_ui_compact";  // NEW: compact/full toggle
    const MAX_INDENT = Number(getComputedStyle(document.documentElement).getPropertyValue("--max-indent")) || 6;

    let notebook = loadNotebook() || seedNotebook();
    let view = "active";
    let focusedId = null;

    // UI compact state
    let uiCompact = (localStorage.getItem(UI_KEY) === "1");
    applyUiMode();

    // DOM
    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");

    const uiToggleTitle = document.getElementById("uiToggleTitle");

    const tabActive = document.getElementById("tabActive");
    const tabArchive = document.getElementById("tabArchive");
    const archCountEl = document.getElementById("archCount");

    const pageSelect = document.getElementById("pageSelect");
    const btnNewPage = document.getElementById("newPage");
    const btnRenamePage = document.getElementById("renamePage");
    const btnDeletePage = document.getElementById("deletePage");

    const btnAdd = document.getElementById("add");
    const btnArchiveDone = document.getElementById("archiveDone");
    const btnRestoreFocused = document.getElementById("restoreFocused");
    const btnDeleteFocused = document.getElementById("deleteFocused");
    const btnEmptyArchive = document.getElementById("emptyArchive");

    const btnCopyTasks = document.getElementById("copyTasks");
    const btnPasteTasks = document.getElementById("pasteTasks");

    const btnExportJson = document.getElementById("exportJson");
    const btnImportJson = document.getElementById("importJson");
    const btnExportTxt  = document.getElementById("exportTxt");
    const btnImportTxt  = document.getElementById("importTxt");

    const btnBackupAll  = document.getElementById("backupAll");
    const btnRestoreAll = document.getElementById("restoreAll");

    const btnSortToggle = document.getElementById("sortTitle");

    const fileJson = document.getElementById("fileJson");
    const fileTxt  = document.getElementById("fileTxt");
    const fileAll  = document.getElementById("fileAll");

    // -----------------------------
    // Helpers
    // -----------------------------
    function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
    function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

    function seedItems(){
      return [
        { id: uid(), text: "Task", done: false, indent: 0, archived: false, archivedAt: null },
        { id: uid(), text: "Subtask (Tab to indent)", done: false, indent: 1, archived: false, archivedAt: null },
      ];
    }

    function seedNotebook(){
      const pid = uid();
      return {
        version: 1,
        activePageId: pid,
        pages: {
          [pid]: { id: pid, name: "Personal", items: seedItems(), sortUndo: null }
        }
      };
    }

    function normalizeItems(raw){
      if (!Array.isArray(raw)) return [];
      return raw.map(x => ({
        id: x.id || uid(),
        text: String(x.text || ""),
        done: !!x.done,
        indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
        archived: !!x.archived,
        archivedAt: x.archivedAt || (x.archived ? Date.now() : null)
      }));
    }

    function ensureNotebookShape(nb){
      if (!nb || typeof nb !== "object") return null;
      if (!nb.pages || typeof nb.pages !== "object") return null;

      const pageIds = Object.keys(nb.pages);
      if (pageIds.length === 0) return null;

      for (const pid of pageIds){
        const p = nb.pages[pid];
        if (!p || typeof p !== "object") return null;

        p.id = pid;
        p.name = String(p.name || "Untitled");
        p.items = normalizeItems(p.items);
        if (!("sortUndo" in p)) p.sortUndo = null;

        if (p.items.filter(x => !x.archived).length === 0){
          p.items.unshift({ id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null });
        }
      }

      if (!nb.activePageId || !nb.pages[nb.activePageId]){
        nb.activePageId = pageIds[0];
      }

      nb.version = 1;
      return nb;
    }

    // -----------------------------
    // UI compact toggle
    // -----------------------------
    function applyUiMode(){
      document.body.classList.toggle("compact-ui", uiCompact);
      uiToggleTitle.textContent = uiCompact ? "Tiny Todo" : "Tiny Todo";
      uiToggleTitle.title = uiCompact ? "Tap to show controls" : "Tap to hide controls";
    }

    function toggleUiMode(){
      uiCompact = !uiCompact;
      localStorage.setItem(UI_KEY, uiCompact ? "1" : "0");
      applyUiMode();
    }

    // -----------------------------
    // Load / Save with Migration
    // -----------------------------
    function loadNotebook(){
      try{
        const raw3 = localStorage.getItem(KEY_V3);
        if (raw3){
          return ensureNotebookShape(JSON.parse(raw3));
        }

        const raw2 = localStorage.getItem(KEY_V2);
        if (raw2){
          const items = normalizeItems(JSON.parse(raw2));
          const pid = uid();
          const nb = ensureNotebookShape({
            version: 1,
            activePageId: pid,
            pages: {
              [pid]: { id: pid, name: "Personal", items: items.length ? items : seedItems(), sortUndo: null }
            }
          });
          localStorage.setItem(KEY_V3, JSON.stringify(nb));
          return nb;
        }

        const raw1 = localStorage.getItem(KEY_V1);
        if (raw1){
          const parsed1 = JSON.parse(raw1);
          if (Array.isArray(parsed1)){
            const migrated = parsed1.map(x => ({
              id: x.id || uid(),
              text: String(x.text || ""),
              done: !!x.done,
              indent: clamp(Number(x.indent || 0), 0, MAX_INDENT),
              archived: false,
              archivedAt: null
            }));
            const pid = uid();
            const nb = ensureNotebookShape({
              version: 1,
              activePageId: pid,
              pages: {
                [pid]: { id: pid, name: "Personal", items: migrated.length ? migrated : seedItems(), sortUndo: null }
              }
            });
            localStorage.setItem(KEY_V3, JSON.stringify(nb));
            return nb;
          }
        }

        return null;
      }catch(e){
        return null;
      }
    }

    function saveNotebook(){
      localStorage.setItem(KEY_V3, JSON.stringify(notebook));
      status("Saved");
      updateArchiveCount();
      rebuildPageSelect();
      updateSortToggleLabel();
    }

    let statusTimer;
    function status(msg){
      statusEl.textContent = msg;
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusEl.textContent = "", 900);
    }

    function currentPage(){ return notebook.pages[notebook.activePageId]; }

    // -----------------------------
    // Pages UI
    // -----------------------------
    function rebuildPageSelect(){
      const pages = Object.values(notebook.pages).slice().sort((a,b) => a.name.localeCompare(b.name));
      const currentId = notebook.activePageId;

      pageSelect.innerHTML = "";
      for (const p of pages){
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        pageSelect.appendChild(opt);
      }
      pageSelect.value = currentId;

      btnDeletePage.disabled = Object.keys(notebook.pages).length <= 1;
    }

    function switchPage(pageId){
      if (!notebook.pages[pageId]) return;
      notebook.activePageId = pageId;
      focusedId = null;
      saveNotebook();
      render(null);
    }

    function newPage(){
      const name = prompt("Page name:", "New Page");
      if (!name) return;
      const id = uid();
      notebook.pages[id] = {
        id,
        name: name.trim(),
        items: [{ id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null }],
        sortUndo: null
      };
      notebook.activePageId = id;
      focusedId = notebook.pages[id].items[0].id;
      saveNotebook();
      setView("active");
      render(focusedId);
      status("Page created");
    }

    function renamePage(){
      const p = currentPage();
      const name = prompt("Rename page:", p.name);
      if (!name) return;
      p.name = name.trim();
      saveNotebook();
      status("Renamed");
    }

    function deletePage(){
      const ids = Object.keys(notebook.pages);
      if (ids.length <= 1) return;

      const p = currentPage();
      const ok = confirm(`Delete page "${p.name}"?\nThis permanently removes all tasks in it.`);
      if (!ok) return;

      delete notebook.pages[p.id];
      const remaining = Object.keys(notebook.pages);
      notebook.activePageId = remaining[0];
      focusedId = null;

      saveNotebook();
      setView("active");
      render(null);
      status("Page deleted");
    }

    // -----------------------------
    // View + Rendering
    // -----------------------------
    function setView(v){
      view = v;
      tabActive.classList.toggle("active", view === "active");
      tabArchive.classList.toggle("active", view === "archive");

      const inActive = view === "active";
      btnAdd.disabled = !inActive;
      btnArchiveDone.style.display = inActive ? "" : "none";

      btnRestoreFocused.style.display = inActive ? "none" : "";
      btnDeleteFocused.style.display  = inActive ? "none" : "";
      btnEmptyArchive.style.display   = (view === "archive") ? "" : "none";

      updateSortToggleLabel();
      render(focusedId);
    }

    function visibleItems(){
      const items = currentPage().items;
      return items.filter(it => view === "active" ? !it.archived : it.archived);
    }

    function updateArchiveCount(){
      const items = currentPage().items;
      archCountEl.textContent = String(items.filter(x => x.archived).length);
    }

    function render(tryFocusId){
      const p = currentPage();
      const vis = visibleItems();
      grid.innerHTML = "";

      if (view === "active" && vis.length === 0){
        const newItem = { id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null };
        p.items.push(newItem);
        saveNotebook();
      }

      const list = visibleItems();
      const isTodayPage = (p.name || "").trim().toLowerCase() === "today";

      list.forEach((it, idx) => {
        const row = document.createElement("div");
        row.className = "row" + (it.done ? " done" : "") + (it.archived ? " archived" : "");
        row.dataset.id = it.id;
        row.dataset.index = String(idx);

        const cellCheck = document.createElement("div");
        cellCheck.className = "cell check";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!it.done;
        cb.addEventListener("change", () => {
          it.done = cb.checked;
          saveNotebook();
          render(it.id);
        });
        cellCheck.appendChild(cb);

        const cellText = document.createElement("div");
        cellText.className = "cell text";
        cellText.style.setProperty("--indent", clamp(it.indent, 0, MAX_INDENT));

        const input = document.createElement("input");
        input.className = "task";
        input.value = it.text || "";
        input.placeholder = (view === "active" && idx === 0 && !it.text) ? "Type a task..." : "";
        input.spellcheck = false;
        input.autocomplete = "off";
        input.addEventListener("focus", () => focusedId = it.id);
        input.addEventListener("input", () => { it.text = input.value; saveNotebook(); });
        input.addEventListener("keydown", (e) => onKey(e, it.id));
        cellText.appendChild(input);

        const cellMove = document.createElement("div");
        cellMove.className = "cell move";
        const moveBtn = document.createElement("button");
        moveBtn.className = "today-btn";
        moveBtn.textContent = "→";
        moveBtn.title = "Move to Today";
        moveBtn.setAttribute("aria-label", "Move to Today");

        const canMove = (view === "active") && !isTodayPage;
        moveBtn.disabled = !canMove;
        moveBtn.addEventListener("click", () => {
          if (!canMove) return;
          moveBlockToToday(it.id);
        });
        cellMove.appendChild(moveBtn);

        row.appendChild(cellCheck);
        row.appendChild(cellText);
        row.appendChild(cellMove);
        grid.appendChild(row);
      });

      updateArchiveCount();
      updateSortToggleLabel();

      if (tryFocusId){
        const el = grid.querySelector(`.row[data-id="${tryFocusId}"] .task`);
        if (el){
          el.focus();
          const v = el.value;
          el.setSelectionRange(v.length, v.length);
        } else {
          const first = grid.querySelector(".row .task");
          if (first) first.focus();
        }
      }
    }

    function focusIndex(i){
      const el = grid.querySelector(`.row[data-index="${i}"] .task`);
      if (el) el.focus();
    }

    function getItemById(id){
      return currentPage().items.find(x => x.id === id) || null;
    }

    function onKey(e, id){
      const p = currentPage();
      const it = getItemById(id);
      if (!it) return;

      const list = visibleItems();
      const idx = list.findIndex(x => x.id === id);
      const input = e.target;
      const canAddRows = (view === "active");

      if ((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        it.done = !it.done;
        saveNotebook();
        render(it.id);
        return;
      }

      if (e.key === "Enter"){
        if (!canAddRows) return;
        e.preventDefault();
        const newItem = { id: uid(), text: "", done:false, indent: it.indent, archived:false, archivedAt:null };
        const globalIndex = p.items.findIndex(x => x.id === it.id);
        p.items.splice(globalIndex + 1, 0, newItem);
        saveNotebook();
        render(newItem.id);
        return;
      }

      if (e.key === "Tab"){
        e.preventDefault();
        it.indent = e.shiftKey ? clamp(it.indent - 1, 0, MAX_INDENT) : clamp(it.indent + 1, 0, MAX_INDENT);
        saveNotebook();
        render(it.id);
        return;
      }

      if (e.key === "Backspace"){
        if (input.value === "" && list.length > 1){
          e.preventDefault();
          const globalIndex = p.items.findIndex(x => x.id === it.id);
          p.items.splice(globalIndex, 1);
          saveNotebook();
          const prevIdx = Math.max(0, idx - 1);
          const after = visibleItems()[prevIdx];
          render(after ? after.id : null);
          return;
        }
      }

      if (e.key === "ArrowUp"){
        const atStart = input.selectionStart === 0 && input.selectionEnd === 0;
        if (atStart || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.max(0, idx - 1));
        }
      }

      if (e.key === "ArrowDown"){
        const atEnd = input.selectionStart === input.value.length && input.selectionEnd === input.value.length;
        if (atEnd || input.value.length === 0){
          e.preventDefault();
          focusIndex(Math.min(list.length - 1, idx + 1));
        }
      }
    }

    // -----------------------------
    // Archive / Restore / Delete
    // -----------------------------
    function archiveDone(){
      const p = currentPage();
      const toArchive = p.items.filter(x => !x.archived && x.done);
      if (toArchive.length === 0){ status("No done tasks"); return; }
      const now = Date.now();
      toArchive.forEach(x => { x.archived = true; x.archivedAt = now; });
      saveNotebook();
      status(`Archived ${toArchive.length}`);
    }

    function restoreFocused(){
      if (!focusedId){ status("No focus"); return; }
      const it = getItemById(focusedId);
      if (!it || !it.archived){ status("Focus an archived task"); return; }
      it.archived = false;
      it.archivedAt = null;
      saveNotebook();
      status("Restored");
      render(it.id);
    }

    function deleteFocused(){
      if (!focusedId){ status("No focus"); return; }
      const p = currentPage();
      const it = getItemById(focusedId);
      if (!it || !it.archived){ status("Focus an archived task"); return; }
      p.items = p.items.filter(x => x.id !== it.id);
      saveNotebook();
      status("Deleted");
      focusedId = visibleItems()[0]?.id || null;
      render(focusedId);
    }

    function emptyArchive(){
      const p = currentPage();
      const count = p.items.filter(x => x.archived).length;
      if (count === 0){ status("Archive empty"); return; }
      if (!confirm(`Permanently delete ${count} archived item(s)?`)) return;
      p.items = p.items.filter(x => !x.archived);
      saveNotebook();
      status("Archive emptied");
      focusedId = visibleItems()[0]?.id || null;
      render(focusedId);
    }

    // -----------------------------
    // Move block to Today (append bottom)
    // -----------------------------
    function findTodayPageId(){
      for (const [pid, pg] of Object.entries(notebook.pages)){
        if (String(pg.name || "").trim().toLowerCase() === "today") return pid;
      }
      return null;
    }

    function ensureTodayPage(){
      let pid = findTodayPageId();
      if (pid && notebook.pages[pid]) return pid;
      pid = uid();
      notebook.pages[pid] = { id: pid, name: "Today", items: [], sortUndo: null };
      return pid;
    }

    function getVisibleBlock(list, startId){
      const startIdx = list.findIndex(x => x.id === startId);
      if (startIdx < 0) return { ids: [], nextFocusId: null };
      const startIndent = Number(list[startIdx].indent || 0);
      const block = [list[startIdx]];
      for (let i = startIdx + 1; i < list.length; i++){
        const ind = Number(list[i].indent || 0);
        if (ind > startIndent) block.push(list[i]);
        else break;
      }
      const after = list[startIdx + block.length];
      const before = list[startIdx - 1];
      const nextFocusId = after ? after.id : (before ? before.id : null);
      return { ids: block.map(x => x.id), nextFocusId };
    }

    function moveBlockToToday(startId){
      const source = currentPage();
      if (String(source.name || "").trim().toLowerCase() === "today") { status("Already in Today"); return; }
      if (view !== "active") { status("Active only"); return; }

      const vis = visibleItems();
      const { ids, nextFocusId } = getVisibleBlock(vis, startId);
      if (!ids.length) return;

      const todayId = ensureTodayPage();
      const today = notebook.pages[todayId];

      source.sortUndo = null;
      today.sortUndo = null;

      const idSet = new Set(ids);
      const moving = [];
      source.items = source.items.filter(it => {
        if (idSet.has(it.id)){ moving.push(it); return false; }
        return true;
      });

      today.items.push(...moving);

      if (source.items.filter(x => !x.archived).length === 0){
        source.items.unshift({ id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null });
      }

      saveNotebook();
      focusedId = nextFocusId || source.items.find(x => !x.archived)?.id || source.items[0]?.id || null;
      render(focusedId);
      status(`Moved ${moving.length}`);
    }

    // -----------------------------
    // Sort toggle (A→Z / Unsort)
    // -----------------------------
    function normTitle(s){ return String(s || "").trim().toLocaleLowerCase(); }

    function blockify(list){
      const blocks = [];
      let current = null;
      for (const it of list){
        const isTop = (Number(it.indent) === 0);
        if (isTop || !current){
          current = { key: normTitle(it.text), items: [it] };
          blocks.push(current);
        } else {
          current.items.push(it);
        }
      }
      for (const b of blocks){ if (!b.key) b.key = ""; }
      return blocks;
    }

    function updateSortToggleLabel(){
      const p = currentPage();
      btnSortToggle.textContent = (p.sortUndo && Array.isArray(p.sortUndo.ids) && p.sortUndo.ids.length)
        ? "Unsort"
        : "Sort A→Z";
    }

    function sortOrUnsortToggle(){
      const p = currentPage();

      if (p.sortUndo && Array.isArray(p.sortUndo.ids) && p.sortUndo.ids.length){
        const snapshot = p.sortUndo.ids.slice();
        const byId = new Map(p.items.map(x => [x.id, x]));
        const restored = [];
        for (const id of snapshot){
          const it = byId.get(id);
          if (it) restored.push(it);
        }
        const restoredIds = new Set(restored.map(x => x.id));
        for (const it of p.items){
          if (!restoredIds.has(it.id)) restored.push(it);
        }
        p.items = restored;
        p.sortUndo = null;
        saveNotebook();
        focusedId = p.items.find(x => !x.archived)?.id || p.items[0]?.id || null;
        render(focusedId);
        status("Unsorted");
        return;
      }

      p.sortUndo = { ids: p.items.map(x => x.id), savedAt: Date.now() };
      const active = p.items.filter(x => !x.archived);
      const archived = p.items.filter(x => x.archived);
      const target = (view === "active") ? active : archived;

      const blocks = blockify(target);
      blocks.sort((a,b) => a.key.localeCompare(b.key));
      const sortedTarget = blocks.flatMap(b => b.items);

      p.items = (view === "active") ? [...sortedTarget, ...archived] : [...active, ...sortedTarget];

      saveNotebook();
      focusedId = sortedTarget[0]?.id || null;
      render(focusedId);
      status("Sorted");
    }

    // -----------------------------
    // Copy / Paste (minimal, block)
    // -----------------------------
    async function writeClipboard(text){
      try{
        await navigator.clipboard.writeText(text);
        return true;
      }catch(e){
        try{
          const ta = document.getElementById("clipFallback");
          ta.value = text;
          ta.focus();
          ta.select();
          return document.execCommand("copy");
        }catch(_){
          return false;
        }
      }
    }

    async function readClipboard(){
      try{
        return await navigator.clipboard.readText();
      }catch(e){
        return prompt("Paste tasks text here:") || "";
      }
    }

    function formatTxtLine(it){
      const tabs = "\t".repeat(clamp(it.indent, 0, MAX_INDENT));
      const mark = it.done ? "[x] " : "[ ] ";
      return tabs + mark + (it.text || "");
    }

    function getActiveVisibleList(){
      const p = currentPage();
      return p.items.filter(it => !it.archived);
    }

    function getBlockFromActive(startId){
      const list = getActiveVisibleList();
      const startIdx = list.findIndex(x => x.id === startId);
      if (startIdx < 0) return [];

      const startIndent = Number(list[startIdx].indent || 0);
      const block = [list[startIdx]];
      for (let i = startIdx + 1; i < list.length; i++){
        const ind = Number(list[i].indent || 0);
        if (ind > startIndent) block.push(list[i]);
        else break;
      }
      return block;
    }

    function blockToText(block){
      return block.map(formatTxtLine).join("\n") + "\n";
    }

    function textToItems(text){
      const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const out = [];
      for (let line of lines){
        if (!line || line.trim() === "") continue;

        let indent = 0;
        while (line.startsWith("\t")){ indent++; line = line.slice(1); }
        while (line.startsWith("  ")){ indent++; line = line.slice(2); }
        indent = clamp(indent, 0, MAX_INDENT);

        const trimmed = line.trimStart();
        let done = false;
        let textPart = trimmed;

        const m = trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
        if (m){
          done = (m[1].toLowerCase() === "x");
          textPart = m[2] ?? "";
        }

        out.push({ id: uid(), text: String(textPart), done, indent, archived:false, archivedAt:null });
      }
      return out;
    }

    function insertItemsBelowFocused(newItems){
      if (!newItems.length) return;
      const p = currentPage();

      let insertIndex = p.items.findIndex(x => x.archived);
      if (insertIndex < 0) insertIndex = p.items.length;

      if (focusedId){
        const gi = p.items.findIndex(x => x.id === focusedId);
        if (gi >= 0 && !p.items[gi].archived){
          const startIndent = Number(p.items[gi].indent || 0);
          let end = gi + 1;
          while (end < p.items.length){
            const next = p.items[end];
            if (next.archived) break;
            const ind = Number(next.indent || 0);
            if (ind > startIndent) end++;
            else break;
          }
          insertIndex = end;
        }
      }

      p.items.splice(insertIndex, 0, ...newItems);
      p.sortUndo = null;
      saveNotebook();
      focusedId = newItems[0].id;
      render(focusedId);
    }

    async function doCopy(){
      if (view !== "active"){ status("Active only"); return; }
      if (!focusedId){ status("No focus"); return; }
      const block = getBlockFromActive(focusedId);
      if (!block.length){ status("Nothing"); return; }
      const ok = await writeClipboard(blockToText(block));
      status(ok ? "Copied" : "Copy failed");
    }

    async function doPaste(){
      if (view !== "active"){ status("Active only"); return; }
      const text = await readClipboard();
      const items = textToItems(text);
      if (!items.length){ status("Nothing"); return; }
      insertItemsBelowFocused(items);
      status("Pasted");
    }

    // -----------------------------
    // Export / Import (page) + Backup/Restore ALL
    // (kept as-is)
    // -----------------------------
    function downloadBlob(blob, filename){
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function safeName(name){
      return String(name || "page").trim().replace(/[^\w\-]+/g, "_").slice(0, 40) || "page";
    }

    function exportJson(){
      const p = currentPage();
      const blob = new Blob([JSON.stringify(p.items, null, 2)], { type: "application/json" });
      downloadBlob(blob, `${safeName(p.name)}-${new Date().toISOString().slice(0,10)}.json`);
    }
    async function importJsonFile(f){
      const p = currentPage();
      const text = await f.text();
      const data = JSON.parse(text);
      p.items = normalizeItems(data);
      if (!p.items.length){
        p.items = [{ id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null }];
      }
      p.sortUndo = null;
      saveNotebook();
      focusedId = p.items.find(x => !x.archived)?.id || p.items[0]?.id || null;
      setView("active");
      status("Imported JSON");
    }

    const ARCHIVE_MARKER = "--- ARCHIVE ---";

    function toPlainText(){
      const p = currentPage();
      const lines = [];
      const active = p.items.filter(x => !x.archived);
      const archived = p.items.filter(x => x.archived);

      for (const it of active) lines.push(formatTxtLine(it));
      if (archived.length){
        lines.push(ARCHIVE_MARKER);
        for (const it of archived) lines.push(formatTxtLine(it));
      }
      return lines.join("\n") + "\n";
    }

    function fromPlainText(text){
      const rawLines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      let inArchive = false;
      const out = [];

      for (let line of rawLines){
        if (!line || line.trim() === "") continue;
        if (line.trim() === ARCHIVE_MARKER){ inArchive = true; continue; }

        let indent = 0;
        while (line.startsWith("\t")){ indent++; line = line.slice(1); }
        while (line.startsWith("  ")){ indent++; line = line.slice(2); }
        indent = clamp(indent, 0, MAX_INDENT);

        const trimmed = line.trimStart();
        let done = false;
        let textPart = trimmed;

        const m = trimmed.match(/^\[(x|X| )\]\s*(.*)$/);
        if (m){
          done = (m[1].toLowerCase() === "x");
          textPart = m[2] ?? "";
        }

        out.push({ id: uid(), text: String(textPart), done, indent, archived: inArchive, archivedAt: inArchive ? Date.now() : null });
      }

      if (out.filter(x => !x.archived).length === 0){
        out.unshift({ id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null });
      }
      return out;
    }

    function exportTxt(){
      const p = currentPage();
      const blob = new Blob([toPlainText()], { type: "text/plain;charset=utf-8" });
      downloadBlob(blob, `${safeName(p.name)}-${new Date().toISOString().slice(0,10)}.txt`);
    }

    async function importTxtFile(f){
      const p = currentPage();
      const text = await f.text();
      p.items = fromPlainText(text);
      p.sortUndo = null;
      saveNotebook();
      focusedId = p.items.find(x => !x.archived)?.id || p.items[0]?.id || null;
      setView("active");
      status("Imported TXT");
    }

    function backupAll(){
      const payload = { format: "tiny-todo-backup", exportedAt: new Date().toISOString(), notebook };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      downloadBlob(blob, `tiny-todo-backup-${new Date().toISOString().slice(0,10)}.json`);
      status("Backup exported");
    }

    async function restoreAllFromFile(f){
      const text = await f.text();
      const data = JSON.parse(text);
      const nbCandidate = (data && data.notebook) ? data.notebook : data;
      const nb = ensureNotebookShape(nbCandidate);
      if (!nb) throw new Error("Invalid backup file");

      const ok = confirm("Restore ALL will replace your current pages and tasks. Continue?");
      if (!ok) return;

      notebook = nb;
      view = "active";
      focusedId = null;
      saveNotebook();
      rebuildPageSelect();
      setView("active");
      render(null);
      status("Restored ALL");
    }

    // -----------------------------
    // Wire up UI
    // -----------------------------
    uiToggleTitle.addEventListener("click", toggleUiMode);

    tabActive.addEventListener("click", () => setView("active"));
    tabArchive.addEventListener("click", () => setView("archive"));

    pageSelect.addEventListener("change", () => switchPage(pageSelect.value));
    btnNewPage.addEventListener("click", newPage);
    btnRenamePage.addEventListener("click", renamePage);
    btnDeletePage.addEventListener("click", deletePage);

    btnAdd.addEventListener("click", () => {
      if (view !== "active") return;
      const p = currentPage();
      const newItem = { id: uid(), text: "", done:false, indent:0, archived:false, archivedAt:null };
      p.items.push(newItem);
      saveNotebook();
      focusedId = newItem.id;
      render(newItem.id);
    });

    btnArchiveDone.addEventListener("click", archiveDone);
    btnRestoreFocused.addEventListener("click", restoreFocused);
    btnDeleteFocused.addEventListener("click", deleteFocused);
    btnEmptyArchive.addEventListener("click", emptyArchive);

    btnCopyTasks.addEventListener("click", doCopy);
    btnPasteTasks.addEventListener("click", doPaste);

    btnExportJson.addEventListener("click", exportJson);
    btnImportJson.addEventListener("click", () => fileJson.click());
    fileJson.addEventListener("change", async () => {
      const f = fileJson.files[0];
      if (!f) return;
      try{ await importJsonFile(f); }
      catch(e){ alert("Import JSON failed: " + e.message); }
      finally{ fileJson.value = ""; }
    });

    btnExportTxt.addEventListener("click", exportTxt);
    btnImportTxt.addEventListener("click", () => fileTxt.click());
    fileTxt.addEventListener("change", async () => {
      const f = fileTxt.files[0];
      if (!f) return;
      try{ await importTxtFile(f); }
      catch(e){ alert("Import TXT failed: " + e.message); }
      finally{ fileTxt.value = ""; }
    });

    btnBackupAll.addEventListener("click", backupAll);
    btnRestoreAll.addEventListener("click", () => fileAll.click());
    fileAll.addEventListener("change", async () => {
      const f = fileAll.files[0];
      if (!f) return;
      try{ await restoreAllFromFile(f); }
      catch(e){ alert("Restore ALL failed: " + e.message); }
      finally{ fileAll.value = ""; }
    });

    btnSortToggle.addEventListener("click", sortOrUnsortToggle);

    // Init
    rebuildPageSelect();
    focusedId = currentPage().items.find(x => !x.archived)?.id || currentPage().items[0]?.id || null;
    setView("active");
    updateSortToggleLabel();
  </script>
</body>
